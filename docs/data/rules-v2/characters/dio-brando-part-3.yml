schemaVersion: 2
rulesVersion: 2
id: dio-brando-part-3
characterId: dio-brando
versionId: stardust-crusaders-high-dio
name: DIO
version: Stardust Crusaders — High DIO
origin: JoJo's Bizarre Adventure
art: dio-brando-part-3.png
role:
  primary: role-eliminator
  secondary: role-controller
archetypes:
- archetype-assassin
- archetype-bruiser
capabilities:
- capability-burst
- capability-multihit
- capability-denial
- capability-follow-up
- capability-durable
- capability-recovery
difficulty: High
gameplan: 'Apply elite close-range pressure immediately, open a stopped-time combat window that denies new enemy plays, then chain Fast replacement cards or commit ROAD ROLLER DA! before time resumes.

  '
sourceBoundary:
  continuity: Original JoJo's Bizarre Adventure manga continuity
  start: Stardust Crusaders chapter 261, immediately after DIO drains Joseph Joestar's blood
  end: Stardust Crusaders chapter 264, before DIO's final defeat
  baselineState: Fully synchronized High DIO with Jonathan Joestar's body and a nine-second Time Stop
  accessibleForms:
  - High DIO
  standardEquipment:
  - The World
  - throwing knives
  - road roller when accessed through the Ultimate pathway
  exceptionalAbilities:
  - Time Stop
  - vampiric blood drain
  - accelerated regeneration
  excludedMaterial:
  - Vaporization Freezing Technique
  - Space Ripper Stingy Eyes
  - Flesh Bud combat control
  - Jonathan's reconnaissance Stand
  - Heaven-plan abilities and post-Part-3 material
  knowledgeBoundary: DIO's knowledge and tactics through the final Cairo battle
  personalityBoundary: Analytical, cruel, theatrical, supremely arrogant, and prone to prolonging a winning position
design:
  thesis: An already-elite eliminator who converts one expensive Time Stop into overwhelming action advantage.
  weakness: Sunlight and Ripple are existential weaknesses; Time Stop must be consciously activated and DIO remains vulnerable to denied actions and Stand damage.
  powerExpression: Ordinary Stand attacks are high benchmark; Time Stop improves action access and definitions rather than creating DIO's baseline strength.
  signatureHax:
  - 'The World: Time Stop'
  - enemy play denial
  - stopped-time Becomes
  mandatoryFeelPoints:
  - DIO is dangerous before Time Stop.
  - Already played enemy cards still resolve.
  - Time Stop creates oppressive Follow-Up chains.
  - ROAD ROLLER DA! requires and consumes Time Stop.
  forbiddenOutcomes:
  - Generic blood reproduces Joseph Joestar's synchronization effect.
  - Time Stop is reduced to ordinary Stun.
  - Blood reduces Energy costs.
  - Part 1 techniques appear without a Part 3 basis.
economyProfile:
  energyDemand: high
  meterDemand: high
  handPressure: high
  setupSpeed: immediate
synergy:
  inputs:
  - energy_support
  - card_access
  - target_isolation
  outputs:
  - fast_pressure
  - action_denial
  - splash_finisher
  - self_recovery
  conflicts:
  - high_energy_demand
  - high_meter_demand
  - close_range_commitment
sourceInteractions:
  interaction-death-note-eligibility:
    outcome: ineligible
    reason: Selected DIO is an undead vampire rather than a living human.
  interaction-vampiric-feeding-eligibility:
    outcome: uncertain
    reason: The source does not establish whether another vampire can gain ordinary feeding benefits from DIO's undead blood.
  interaction-vampire-sunlight:
    outcome: vulnerable
    reason: Sunlight remains an existential vampire weakness.
  interaction-vampire-ripple:
    outcome: vulnerable
    reason: Ripple remains an existential vampire weakness.
