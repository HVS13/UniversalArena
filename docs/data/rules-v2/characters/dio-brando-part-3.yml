schemaVersion: 2
rulesVersion: 2
id: dio-brando-part-3
characterId: dio-brando
versionId: stardust-crusaders-cairo-dio
name: DIO
version: Stardust Crusaders — Cairo DIO (Arc Composite)
origin: JoJo's Bizarre Adventure
art: dio-brando-part-3.png
role: {primary: role-eliminator, secondary: role-controller}
archetypes: [archetype-assassin, archetype-bruiser]
capabilities:
- capability-burst
- capability-multihit
- capability-denial
- capability-follow-up
- capability-durable
- capability-recovery
- capability-ramp
- capability-resource
difficulty: High
gameplan: Feed on eligible targets to build Stolen Blood and Blood Focus, convert that physiological momentum into lower Energy costs and longer Time Stop, then choose between sustained stopped-time pressure,
  survival, or ROAD ROLLER DA!.
sourceBoundary:
  continuity: Original JoJo's Bizarre Adventure manga continuity
  start: The final Cairo confrontation before DIO drains Joseph Joestar's blood
  end: Stardust Crusaders chapter 264, before DIO's final defeat
  baselineState: Part 3 DIO with Jonathan Joestar's body, The World, vampiric feeding, and an established but not yet Joseph-completed synchronization state
  accessibleForms: [Greater synchronization and the Greatest High endpoint through the final-battle progression]
  standardEquipment: [The World, throwing knives, road roller when accessed through the Ultimate pathway]
  exceptionalAbilities: [Time Stop, vampiric blood drain, accelerated regeneration]
  excludedMaterial: [Vaporization Freezing Technique, Space Ripper Stingy Eyes, Flesh Bud combat control, Jonathan's reconnaissance Stand, Heaven-plan abilities and post-Part-3 material]
  knowledgeBoundary: DIO's knowledge and tactics through the final Cairo battle
  personalityBoundary: Analytical, cruel, theatrical, supremely arrogant, and prone to prolonging a winning position
design: {thesis: 'Build Stolen Blood through feeding, convert it into lower costs and longer Time Stop, then overwhelm the opponent during a controlled action window.', weakness: 'DIO begins Energy-hungry,
    requires successful eligible feeding to reach his full action economy, and remains existentially vulnerable to sunlight and Ripple.', powerExpression: 'The World is dangerous from the start, but feeding
    materially expands how many actions DIO can afford and how long he can dominate stopped time.', signatureHax: ['The World: Time Stop', enemy play denial followed by next-turn Stun, blood-driven action
      economy, stopped-time Becomes], mandatoryFeelPoints: [Feeding materially increases DIO's options., DIO retains a useful low-investment Basic floor before feeding., Time Stop denies new enemy plays
      and leaves a next-turn Stun stage., The World creates faster and more oppressive variants., ROAD ROLLER DA! competes with survival and Time Stop duration for Stolen Blood.], forbiddenOutcomes: [DIO
      starts as fully completed High DIO and skips the feeding progression., Removing Blood Focus without rebasing every Energy cost., Time Stop functions only as ordinary Stun or only as a numeric buff.,
    Blood can be gained from targets without eligible usable blood., Part 1 techniques appear without a Part 3 basis.]}
economyProfile: {energyDemand: high, meterDemand: high, handPressure: high, setupSpeed: ramp}
synergy:
  inputs: [eligible_blood_targets, energy_support, card_access, stun]
  outputs:
  - fast_pressure
  - action_denial
  - stun
  - bleed
  - splash_finisher
  - self_recovery
  conflicts: [high_energy_demand, high_meter_demand, setup_dependency]
sourceInteractions: {interaction-death-note-eligibility: {outcome: ineligible, reason: Selected DIO is an undead vampire rather than a living human.}, interaction-vampiric-feeding-eligibility: {outcome: uncertain,
    reason: The source does not establish whether another vampire can gain ordinary feeding benefits from DIO's undead blood.}, interaction-vampire-sunlight: {outcome: vulnerable, reason: Sunlight remains
      an existential vampire weakness.}, interaction-vampire-ripple: {outcome: vulnerable, reason: Ripple remains an existential vampire weakness.}}
innates:
- id: dio-vampire-physiology
  name: Vampire Physiology
  mitigations:
  - id: dio-physical-resistance
    kind: resist
    amount: 3
    amountMode: flat
    include: {mode: any, damageTypes: [damage-physical]}
  - {id: dio-sunlight-weakness, kind: weakness, sourceInteractionId: interaction-vampire-sunlight}
  - {id: dio-ripple-weakness, kind: weakness, sourceInteractionId: interaction-vampire-ripple}
  setup: []
  triggers: []
- id: dio-predators-regeneration
  name: Predator's Regeneration
  setup: []
  triggers:
  - id: dio-heal-from-blood
    event: status_changed
    scope: once_per_turn
    filters: {subject: self, statusId: unique-dio-stolen-blood, direction: upward}
    effects:
    - {id: dio-heal-from-blood-effect, timing: on_gain, scope: once_per_turn, type: heal, targetRef: subject, amount: {kind: flat, value: 10}}
- id: dio-blood-is-power
  name: Blood Is Power
  setup: []
  triggers:
  - id: dio-mirror-blood-gain
    event: status_changed
    scope: continuous
    filters: {subject: self, statusId: unique-dio-stolen-blood, direction: upward, useEventAmount: true}
    effects:
    - {id: dio-gain-blood-focus, timing: on_gain, scope: per_amount_spent, type: gain_status, targetRef: subject, statusId: unique-dio-blood-focus, amount: {ref: event_amount, evaluation: effect_resolution}}
  - id: dio-mirror-blood-spend
    event: status_changed
    scope: continuous
    filters: {subject: self, statusId: unique-dio-stolen-blood, direction: downward, useEventAmount: true}
    effects:
    - {id: dio-reduce-blood-focus, timing: on_gain, scope: per_amount_spent, type: reduce_status, targetRef: subject, statusId: unique-dio-blood-focus, stat: value, amount: {ref: event_amount, evaluation: effect_resolution}}
  - id: dio-survive-defeat
    event: would_be_defeated
    scope: once_per_game
    filters: {subject: self, condition: {kind: subject_status_compare, statusId: unique-dio-stolen-blood, stat: value, operator: greater_or_equal, value: 3}}
    decision:
      kind: optional_defeat_replacement
      costs:
      - {kind: spend_status, statusId: unique-dio-stolen-blood, amount: {kind: flat, value: 3}}
      effects:
      - {id: dio-survive-set-hp, timing: would_be_defeated, scope: once_per_game, type: set_hp, targetRef: subject, amount: {kind: flat, value: 1}}
    effects: []
statusEffects:
- id: unique-dio-stolen-blood
  name: Stolen Blood
  type: unique
  mode: value
  caps: {value: 10}
  visibility: public
  persistence: {onDefeat: remove, onSourceDefeat: independent, onResurrection: remove, genericCleanse: immune, genericDispel: immune, genericPurge: immune, zeroBehavior: remove}
  rules:
  - {id: dio-stolen-blood-decay, timing: turn_end, scope: once_per_turn, type: reduce_status, targetRef: subject, statusId: unique-dio-stolen-blood, stat: value, amount: {kind: flat, value: 1}}
- id: unique-dio-blood-focus
  name: Blood Focus
  type: unique
  mode: value
  caps: {value: 10}
  visibility: public
  persistence: {onDefeat: remove, onSourceDefeat: independent, onResurrection: remove, genericCleanse: immune, genericDispel: immune, genericPurge: immune, zeroBehavior: remove}
  rules:
  - id: dio-blood-focus-cost-reduction
    timing: on_gain
    scope: continuous
    type: modify_cost
    target: {kind: owned_cards, owner: subject}
    costType: energy
    operation: reduce_by_status_value
    statusId: unique-dio-blood-focus
    minimum: 0
  - {id: dio-blood-focus-decay, timing: turn_end, scope: once_per_turn, type: reduce_status, targetRef: subject, statusId: unique-dio-blood-focus, stat: value, amount: {kind: flat, value: 1}}
- id: unique-dio-time-stop
  name: 'The World: Time Stop'
  type: unique
  mode: value
  caps: {value: 8}
  visibility: public
  persistence: {onDefeat: remove, onSourceDefeat: remove, onResurrection: remove, genericCleanse: immune, genericDispel: immune, genericPurge: immune, zeroBehavior: expire}
  rules:
  - {id: dio-time-stop-strength, timing: on_gain, scope: once_per_use, type: gain_status, targetRef: subject, statusId: status-strength, amount: {kind: flat, value: 2}, countAmount: {kind: flat, value: 2}}
  - {id: dio-time-stop-haste, timing: on_gain, scope: once_per_use, type: gain_status, targetRef: subject, statusId: status-haste, amount: {kind: flat, value: 2}, countAmount: {kind: flat, value: 2}}
  - id: dio-time-stop-follow-up
    timing: on_gain
    scope: continuous
    type: grant_keyword
    target: {kind: owned_cards, owner: subject, actionTypes: [action-attack]}
    keywordId: keyword-follow-up
    condition: {kind: subject_status_compare, statusId: unique-dio-time-stop, stat: value, operator: greater_or_equal, value: 1}
  - {id: dio-time-stop-decay, timing: turn_end, scope: once_per_turn, type: reduce_status, targetRef: subject, statusId: unique-dio-time-stop, stat: value, amount: {kind: flat, value: 1}}
  - {id: dio-time-stop-strain, timing: on_expire, scope: once_per_use, type: gain_status, targetRef: subject, statusId: status-strain, amount: {kind: flat, value: 2}, countAmount: {kind: flat, value: 4}}
