sourceBasis:
- id: dio-source-world-power
  classification: demonstrated
  sources:
  - reference: Stardust Crusaders manga chapters 248-264
    note: The World is an elite close-range Stand capable of overpowering opponents before Time Stop is considered.
  interpretation: DIO receives high ordinary Attack and Defense Power rather than a weak pre-setup baseline.
  uncertainty: Exact cross-setting numeric comparison remains a gameplay benchmark decision.
  intentionalDeviation: Power ranges are comparative game values, not literal destructive-output measurements.
  supports:
  - dio-world-barrage
  - dio-world-guard
  - dio-world-barrage-stopped
  - dio-world-guard-stopped
- id: dio-source-time-stop
  classification: demonstrated
  sources:
  - reference: Stardust Crusaders manga chapters 248-264
    note: DIO consciously stops time, acts while others cannot, and reaches a nine-second endpoint after Joseph's blood.
  interpretation: One activation creates a binary combat-round play-denial window; already committed cards continue.
  uncertainty: Literal seconds are not converted into an arbitrary number of card plays.
  intentionalDeviation: Follow-Up and Becomes model action advantage without claiming one card equals one second.
  supports:
  - unique-dio-time-stop
  - dio-time-stop
  - dio-world-barrage-stopped
  - dio-world-guard-stopped
  - dio-knife-barrage-stopped
  - dio-road-roller
- id: dio-source-blood-drain
  classification: demonstrated
  sources:
  - reference: Stardust Crusaders manga, Joseph blood-drain sequence
    note: Blood restores and strengthens DIO's vampiric body.
  interpretation: Blood Reserve supports healing and one narrow defeat replacement only when the target has usable blood.
  uncertainty: Arbitrary crossover blood does not reproduce Joseph Joestar's unique synchronization effect; feeding eligibility requires a separate source-interaction ruling.
  intentionalDeviation: Blood Reserve is capped and has no Energy or Time Stop-duration conversion.
  supports:
  - unique-dio-blood-reserve
  - dio-vampiric-drain
  - dio-predators-regeneration
  - dio-final-regeneration
  - interaction-vampiric-feeding-eligibility
- id: dio-source-knives
  classification: demonstrated
  sources:
  - reference: Stardust Crusaders manga, ordinary knife attacks
    note: DIO carries and throws multiple knives as physical projectiles.
  interpretation: Base Knife Barrage is a six-Hit Physical ranged Technique.
  uncertainty: Exact knife count varies by panel and adaptation.
  intentionalDeviation: Six Hits creates a readable non-stopped baseline.
  supports:
  - dio-knife-barrage
- id: dio-source-stopped-knives
  classification: demonstrated
  sources:
  - reference: Stardust Crusaders manga, stopped-time knife sequence
    note: DIO throws multiple knives in stopped time; they halt near Jotaro and resume when time flows.
  interpretation: Knife Barrage gains more Hits and Fast speed through Becomes while Time Stop is active.
  uncertainty: Exact number of knives varies by panel and adaptation.
  intentionalDeviation: Ten Hits is a gameplay-readable representation of overwhelming projectile pressure.
  supports:
  - dio-knife-barrage-stopped
- id: dio-source-road-roller
  classification: demonstrated
  sources:
  - reference: Stardust Crusaders manga chapter 263
