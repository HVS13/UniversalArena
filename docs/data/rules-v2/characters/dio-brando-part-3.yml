sourceBasis:
- id: dio-source-world
  classification: baseline
  sources: [{reference: Stardust Crusaders final Cairo battle, note: 'The World is a close-range Stand with exceptional power, speed, precision, and defensive interception.'}]
  interpretation: The World supports high-Basic Power and direct Attack/Defense clash participation.
  uncertainty: ''
  intentionalDeviation: ''
- id: dio-source-vampirism
  classification: baseline
  sources: [{reference: Part 1 vampire rules and Part 3 blood-drain scenes, note: 'DIO feeds on blood, regenerates, resists ordinary harm, and remains weak to sunlight and Ripple.'}]
  interpretation: Physical resistance and blood-gated recovery represent persistent vampire physiology.
  uncertainty: Cross-setting feeding eligibility requires typed adjudication.
  intentionalDeviation: ''
- id: dio-source-feeding-engine
  classification: unlockable
  sources: [{reference: DIO's restoration and Joseph blood-drain progression, note: 'Feeding materially restores DIO and improves his synchronization, confidence, and action capacity.'}]
  interpretation: Stolen Blood and Blood Focus are gameplay abstractions of restored physiology and expanded action economy; they do not claim Energy is literal blood.
  uncertainty: Generic blood cannot reproduce Joseph's exact Joestar-specific endpoint.
  intentionalDeviation: Any eligible blood may advance the game engine, but only the selected arc-composite source boundary permits the final-battle climax.
- id: dio-source-time-stop
  classification: baseline
  sources: [{reference: The World sequences in the final Cairo battle, note: 'DIO acts while others cannot, layers actions, throws knives, and repeatedly increases the stopped-time window.'}]
  interpretation: Current-round play denial, next-turn Stun, Follow-Up, duration Value, and stopped-time variants reproduce the two-stage action advantage.
  uncertainty: ''
  intentionalDeviation: Literal seconds are abstracted into status Value and card windows.
- id: dio-source-knives
  classification: baseline
  sources: [{reference: Stopped-time knife attack against Jotaro, note: DIO suspends many knives and releases them when time resumes.}]
  interpretation: Multihit, Bleed, and stopped-time hit increase represent layered projectile pressure.
  uncertainty: ''
  intentionalDeviation: ''
- id: dio-source-road-roller
  classification: exceptional
  sources: [{reference: ROAD ROLLER DA! sequence, note: DIO uses stopped time to deliver an overwhelming road-roller impact.}]
  interpretation: Requires Time Stop, uses Splash, and consumes the stopped-time window.
  uncertainty: ''
  intentionalDeviation: Optional blood spending preserves the original resource-finisher decision.
