schemaVersion: 2
rulesVersion: 2
id: light-yagami-kira
characterId: light-yagami
versionId: kira-manga
name: Light Yagami
version: "Kira — Original Manga"
origin: Death Note
art: light-yagami-kira.png
role:
  primary: role-specialist
  secondary: role-eliminator
archetypes: [archetype-tactician]
capabilities:
  - capability-information
  - capability-alternate-defeat
  - capability-targeting
  - capability-denial
  - capability-card-access
difficulty: High
gameplan: >
  Confirm a valid target's true name and face through information actions, protect
  the investigation with misdirection, then write the name. Ultimate Meter may
  complete missing access, but it never strengthens or accelerates the notebook.
sourceBoundary:
  continuity: "Original Death Note manga continuity"
  start: "Light owns a Death Note and retains his Kira memories"
  end: "Manga chapter 108, before Light's death"
  baselineState: "Human Light with Death Note ownership, Kira memories, concealed page fragments, and no Shinigami Eyes"
  accessibleForms: []
  standardEquipment: ["Death Note", "concealed Death Note page fragments", "ordinary surveillance and communication tools"]
  exceptionalAbilities: ["Death Note rules and ownership-based access"]
  excludedMaterial:
    - "Shinigami Eyes"
    - "Misa Amane, Teru Mikami, or Kiyomi Takada as innate summons"
    - "Pilot-chapter Death Eraser"
    - "Film-continuity page-destruction cancellation"
  knowledgeBoundary: "Light's demonstrated knowledge and planning through the final manga investigation"
  personalityBoundary: "Brilliant, manipulative, controlling, arrogant, and willing to accept escalating risks to preserve Kira"
design:
  thesis: "A physically vulnerable specialist who converts verified identity access into a decisive alternate defeat."
  weakness: "Light is human, has no direct supernatural combat defense, needs a valid living-human target, and must spend actions confirming a true name and face."
  powerExpression: "No unsupported combat parity: regular cards provide information and denial, while the Death Note supplies the decisive payoff."
  signatureHax: ["human-only Death Note eligibility", "true-name-and-face access", "persistent Name Written schedule"]
  mandatoryFeelPoints:
    - "Light does not deal generic Mental damage."
    - "Eligibility is separate from ordinary targeting."
    - "Learned identity information does not decay or Cleanse away."
    - "A successfully written name remains scheduled after Light is defeated."
    - "Ultimate Meter improves access, not notebook lethality."
  forbiddenOutcomes:
    - "Nonhuman targets die merely because they have six information stacks."
    - "Light possesses Shinigami Eyes."
    - "Meter shortens an existing death schedule."
    - "Generic status removal erases a written name."
economyProfile:
  energyDemand: low
  meterDemand: high
  handPressure: medium
  setupSpeed: setup
synergy:
  inputs: [allied_protection, action_denial, card_access]
  outputs: [information, target_lockout, alternate_defeat_pressure]
  conflicts: [physically_vulnerable, ineligible_targets, setup_dependency]
sourceInteractions:
  interaction-death-note-eligibility:
    outcome: eligible
    reason: "Selected Light is a living human and may be targeted by another valid Death Note user."
innates:
  - id: light-meticulous-planner
    name: Meticulous Planner
    setup: []
    triggers:
      - id: light-draw-from-new-information
        event: status_inflicted
        scope: once_per_turn
        filters:
          source: self
          statusId: unique-light-stolen-information
          direction: upward
        effects:
          - id: light-draw-from-information-effect
            timing: on_gain
            scope: once_per_turn
            type: draw_cards
            targetRef: source_team
            amount: { kind: flat, value: 1 }
statusEffects:
  - id: unique-light-stolen-information
    name: Stolen Information
    type: unique
    mode: stack
    caps: { stack: 6 }
    visibility: public
    sourceTracking: required
    persistence:
      onDefeat: persist
      onSourceDefeat: independent
      onResurrection: persist
      genericCleanse: immune
      genericDispel: immune
      genericPurge: immune
      zeroBehavior: remove
    rules: []
  - id: unique-light-name-written
    name: Name Written in the Death Note
    type: unique
    mode: binary
    caps: { value: 1 }
    visibility: public
    sourceTracking: required
    schedule:
      anchor: next_subject_team_turn_end
      startsAfterApplication: true
    persistence:
      onDefeat: persist_until_scheduled_resolution
      onSourceDefeat: independent
      onResurrection: persist
      genericCleanse: immune
      genericDispel: immune
      genericPurge: immune
      zeroBehavior: remove
    rules:
      - id: light-name-written-defeat
        timing: turn_end
        scope: once_per_turn
        type: defeat
        targetRef: subject
        condition:
          kind: source_schedule_due
          schedule: next_subject_team_turn_end
          ifAlreadyDefeated: no_additional_defeat
      - id: light-name-written-expire
        timing: turn_end
        scope: once_per_turn
        type: remove_status
        targetRef: subject
        statusId: unique-light-name-written
        condition:
          kind: source_schedule_due
          schedule: next_subject_team_turn_end
createdCards: []
