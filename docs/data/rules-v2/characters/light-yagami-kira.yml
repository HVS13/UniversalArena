    name: "Death Note: Judgment"
    lifecycle: repeatable
    variants: [{ cardId: light-judgment }]
sourceBasis:
  - id: light-source-contestable-pressure
    classification: baseline
    sources: [{ reference: Light's interrogations and psychological contests, note: Light pressures opponents and shapes decisions without supernatural psychic force. }]
    interpretation: Low Mental Attack Power represents contestable psychological pressure and operational disruption, not telepathy.
    uncertainty: Mental damage is a game abstraction.
    intentionalDeviation: Retains normal Attack clash participation at human-level Power.
  - id: light-source-contestable-defense
    classification: baseline
    sources: [{ reference: Light's alibis and controlled persona, note: Light survives through concealment, composure, and prepared explanations. }]
    interpretation: Low Mental Defense represents an alibi and evasive positioning rather than supernatural armor.
    uncertainty: ''
    intentionalDeviation: Power Shield abstracts preserved operational safety.
  - id: light-source-information-methods
    classification: baseline
    sources: [{ reference: Light's investigation and surveillance, note: Light accumulates partial and complete target profiles. }]
    interpretation: Incomplete Stolen Information decays until a complete six-stack identity profile is reached.
    uncertainty: ''
    intentionalDeviation: Turn-End decay creates pressure to maintain an active investigation.
  - { id: light-source-surveillance, classification: baseline, sources: [{ reference: Light's surveillance and retained plans, note: Prepared observation creates reliable information access. }], interpretation: Retain represents a prepared surveillance route., uncertainty: '', intentionalDeviation: '' }
  - { id: light-source-blackmail, classification: baseline, sources: [{ reference: Light's coercion and manipulation, note: He converts personal knowledge into hesitation and restricted choices. }], interpretation: Stagnate and Slow model tempo denial., uncertainty: '', intentionalDeviation: '' }
  - id: light-source-death-note-eligibility
    classification: baseline
    sources: [{ reference: Death Note How to Use It rules, note: The notebook requires an eligible human, a true name, and the writer picturing the face. }]
    interpretation: Ordinary targeting is separate from Death Note eligibility; six information represents confirmed name-and-face access.
    uncertainty: Crossover species require typed adjudication.
    intentionalDeviation: ''
  - id: light-source-countdown
    classification: baseline
    sources: [{ reference: Death Note timing rules, note: A valid written name creates a scheduled and difficult-to-reverse death. }]
    interpretation: A visible three-Value countdown preserves alternate defeat while creating a response window.
    uncertainty: ''
    intentionalDeviation: Literal seconds are translated into team Turn Ends.
  - id: light-source-judgment
    classification: exceptional
    sources: [{ reference: Light's prepared contingencies and timing control, note: Light spends accumulated resources to compress the remaining plan. }]
    interpretation: Ultimate Meter establishes or shortens the public countdown; it does not add ordinary damage.
    uncertainty: ''
    intentionalDeviation: Shared Meter represents strategic preparation and execution capacity.
consideredButOmitted:
  - { name: Shinigami Eyes, reason: Light repeatedly refuses the eye deal and does not possess the Eyes in the selected version., sourceBasisIds: [light-source-death-note-eligibility] }
  - { name: Misa Amane, reason: Independent character and situational collaborator, not an innate summon., sourceBasisIds: [light-source-judgment] }
  - { name: Teru Mikami, reason: Independent character and situational collaborator, not an innate summon., sourceBasisIds: [light-source-judgment] }
  - { name: Kiyomi Takada, reason: Independent character and situational collaborator, not an innate summon., sourceBasisIds: [light-source-judgment] }
  - { name: Death Eraser, reason: Pilot-only material outside original manga continuity., sourceBasisIds: [light-source-countdown] }
migrationStatus: audited_parallel
