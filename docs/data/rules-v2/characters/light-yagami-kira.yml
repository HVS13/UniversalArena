          value: 3
sourceBasis:
  - id: source-death-note-human-name-face
    classification: core
    sources:
      - reference: "Death Note manga, How to Use It I; chapter 1"
        note: "The notebook kills a human whose name is written, and the writer must know the target's face."
    interpretation: "Eligibility and verified true-name/face access are separate from ordinary targeting."
    uncertainty: "Hybrid and artificial crossover beings require individual adjudication."
    intentionalDeviation: "Stolen Information uses six visible stacks to represent completed access."
    supports: [interaction-death-note-eligibility, unique-light-stolen-information, light-write-the-name, light-just-as-planned]
  - id: source-death-note-timing
    classification: core
    sources:
      - reference: "Death Note manga, How to Use It I"
        note: "Cause is written within forty seconds and details within six minutes forty seconds."
    interpretation: "The game schedules one near-term Turn End defeat rather than Meter-scaled countdown acceleration."
    uncertainty: "A combat-round-to-seconds conversion is intentionally not claimed."
    intentionalDeviation: "Public scheduled status is used for counterplay clarity."
    supports: [unique-light-name-written]
  - id: source-death-note-unavoidable
    classification: core
    sources:
      - reference: "Death Note manga, How to Use It XI; chapter 17"
        note: "Once the victim's name is written, the death cannot be avoided."
    interpretation: "Generic Cleanse, Dispel, and Purge cannot remove Name Written."
    uncertainty: "External crossover defeat replacements and post-death Resurrection are not directly tested by the source."
    intentionalDeviation: "External Resurrection is not automatically prohibited after the defeat resolves."
    supports: [unique-light-name-written]
  - id: source-light-information-methods
    classification: demonstrated
    sources:
      - reference: "Death Note manga, FBI-agent and Naomi Misora investigations"
        note: "Light acquires identity information through observation, conversation, records, and manipulation."
    interpretation: "Basic actions build information rather than deal Mental damage."
    uncertainty: ""
    intentionalDeviation: ""
    supports: [light-observe]
  - id: source-light-misdirection
    classification: demonstrated
    sources:
      - reference: "Death Note manga, surveillance-camera and alibi sequences"
        note: "Light manages appearances and directs investigators toward false conclusions."
    interpretation: "Misdirection slows a profiled opponent's execution."
    uncertainty: ""
    intentionalDeviation: "Slow abstracts lost tempo rather than supernatural mind control."
    supports: [light-controlled-narrative]
  - id: source-light-surveillance
    classification: demonstrated
    sources:
      - reference: "Death Note manga, surveillance and investigation arcs"
        note: "Light repeatedly gathers and retains actionable observations."
    interpretation: "Surveillance produces more information and remains available through Retain."
    uncertainty: ""
    intentionalDeviation: ""
    supports: [light-surveillance]
  - id: source-light-social-engineering
    classification: demonstrated
    sources:
      - reference: "Death Note manga, Raye Penber and Naomi Misora sequences"
        note: "Light manipulates informed targets into losing safe options."
    interpretation: "A sufficiently profiled target temporarily loses access to new Attack plays."
    uncertainty: "This is a game abstraction of coercion and misdirection, not literal control of every opponent."
    intentionalDeviation: "Already played cards continue to resolve."
    supports: [light-social-engineering]
  - id: source-light-contingencies
    classification: demonstrated
    sources:
      - reference: "Death Note manga, memory-loss, Yotsuba, and final-investigation plans"
        note: "Light uses layered contingencies, proxies, concealed pages, and prearranged information routes."
    interpretation: "The Ultimate completes missing access from a partial file."
    uncertainty: ""
    intentionalDeviation: "Ultimate Meter substitutes for several information actions but never changes the notebook's kill rule."
    supports: [light-just-as-planned]
consideredButOmitted:
  - name: Shinigami Eyes
    classification: excluded
    reason: "Light repeatedly refuses the eye deal and never possesses the Eyes."
    sourceBasisIds: [source-death-note-human-name-face]
  - name: Misa, Mikami, and Takada as summons
    classification: excluded
    reason: "They are independent people with their own agency and source conditions."
    sourceBasisIds: [source-light-contingencies]
  - name: Generic Mental-damage Strike
    classification: excluded
    reason: "Light has no psychic attack; intelligence and manipulation are represented as information and denial."
    sourceBasisIds: [source-light-information-methods]
  - name: Meter-powered countdown reduction
    classification: excluded
    reason: "Ultimate Meter has no canonical relationship to Death Note timing."
    sourceBasisIds: [source-death-note-timing]
