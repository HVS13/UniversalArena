schemaVersion: 2
rulesVersion: 2
id: light-yagami-kira
characterId: light-yagami
versionId: kira-manga
name: Light Yagami
version: Kira — Original Manga
origin: Death Note
art: light-yagami-kira.png
role: { primary: role-controller, secondary: role-eliminator }
archetypes: [archetype-tactician]
capabilities: [capability-information, capability-alternate-defeat, capability-targeting, capability-denial, capability-card-access, capability-clash]
difficulty: High
gameplan: >
  Use cheap contestable Basics and retained surveillance to build Stolen Information,
  maintain pressure before partial leads decay, write one valid human name, then spend
  Ultimate Meter to shorten the visible Death Note countdown.
sourceBoundary:
  continuity: Original Death Note manga continuity
  start: Light owns a Death Note and retains his Kira memories
  end: Manga chapter 108, before Light's death
  baselineState: Human Light with Death Note ownership, Kira memories, concealed page fragments, ordinary planning tools, and no Shinigami Eyes
  accessibleForms: []
  standardEquipment: [Death Note, concealed Death Note page fragments, ordinary surveillance and communication tools]
  exceptionalAbilities: [Death Note rules and ownership-based access]
  excludedMaterial: [Shinigami Eyes, Misa Amane as an innate summon, Teru Mikami as an innate summon, Kiyomi Takada as an innate summon, Pilot-chapter Death Eraser, film-continuity page-destruction cancellation]
  knowledgeBoundary: Light's demonstrated knowledge and planning through the final manga investigation
  personalityBoundary: Brilliant, manipulative, controlling, arrogant, and willing to accept escalating risks to preserve Kira
design:
  thesis: Build and maintain a target profile through cheap contestable actions, write one valid name, then compress the opponent's remaining response window with Ultimate Meter.
  weakness: Light has low human-level clash Power, partial information decays, the Death Note only affects eligible humans whose name and face are sufficiently confirmed, and his countdown can be pressured before completion.
  powerExpression: Light contributes through efficient information, deception, and a decisive alternate-defeat route; his Basic Power is intentionally low but lets him participate in the normal clash system.
  signatureHax: [human-only Death Note eligibility, true-name-and-face access, persistent Death by Death Note countdown, Meter-based countdown acceleration]
  mandatoryFeelPoints:
    - Light's Basics remain contestable Attack and Defense cards.
    - Stolen Information creates visible pressure and decays until the profile is complete.
    - A valid written name begins a three-step countdown that persists after Light is defeated.
    - Ultimate Meter accelerates planning and execution without converting the Death Note into ordinary damage.
    - Light never receives high combat Power or generic psychic superiority.
  forbiddenOutcomes:
    - Every Light card becomes an unopposed Special.
    - Nonhuman targets die merely because they have six information stacks.
    - Light possesses Shinigami Eyes.
    - The Death Note becomes ordinary damage.
    - Light receives unsupported duel parity.
economyProfile: { energyDemand: low, meterDemand: high, handPressure: medium, setupSpeed: setup }
synergy:
  inputs: [allied_protection, action_denial, card_access]
  outputs: [information, slow, stagnate, alternate_defeat_pressure]
  conflicts: [low_direct_power, ineligible_targets, setup_decay]
sourceInteractions:
  interaction-death-note-eligibility: { outcome: eligible, reason: Selected Light is a living human and may be targeted by another valid Death Note user. }
  interaction-vampiric-feeding-eligibility: { outcome: eligible, reason: Selected Light is a living human with ordinary blood. }
innates:
  - id: light-meticulous-planner
    name: Meticulous Planner
    setup: []
    triggers:
      - id: light-draw-from-information
        event: status_inflicted
        scope: once_per_turn
        filters: { source: self, statusId: unique-light-stolen-information, direction: upward }
        effects:
          - { id: light-draw-from-information-effect, timing: on_gain, scope: once_per_turn, type: draw_cards, targetRef: source_team, amount: { kind: flat, value: 1 } }
statusEffects:
  - id: unique-light-stolen-information
    name: Stolen Information
    type: unique
    mode: stack
    caps: { stack: 6 }
    visibility: public
    sourceTracking: required
    persistence: { onDefeat: persist, onSourceDefeat: independent, onResurrection: persist, genericCleanse: immune, genericDispel: immune, genericPurge: immune, zeroBehavior: remove }
    rules:
      - id: light-information-decay
        timing: turn_end
        scope: once_per_turn
        type: reduce_status
        targetRef: subject
        statusId: unique-light-stolen-information
        stat: stack
        amount: { kind: flat, value: 1 }
        condition: { kind: subject_status_compare, statusId: unique-light-stolen-information, stat: stack, operator: less_or_equal, value: 5 }
  - id: unique-light-death-note-countdown
    name: Death by Death Note
    type: unique
    mode: value
    caps: { value: 3 }
    visibility: public
    sourceTracking: required
    initialValue: 3
    persistence: { onDefeat: persist_until_resolution, onSourceDefeat: independent, onResurrection: persist, genericCleanse: immune, genericDispel: immune, genericPurge: immune, zeroBehavior: resolve }
    rules:
      - { id: light-death-note-tick, timing: turn_end, scope: once_per_turn, type: reduce_status, targetRef: subject, statusId: unique-light-death-note-countdown, stat: value, amount: { kind: flat, value: 1 } }
      - { id: light-death-note-defeat, timing: turn_end, scope: once_per_turn, type: defeat, targetRef: subject, condition: { kind: subject_status_compare, statusId: unique-light-death-note-countdown, stat: value, operator: less_or_equal, value: 0, ifAlreadyDefeated: no_additional_defeat } }
      - { id: light-death-note-expire, timing: turn_end, scope: once_per_turn, type: remove_status, targetRef: subject, statusId: unique-light-death-note-countdown, condition: { kind: subject_status_compare, statusId: unique-light-death-note-countdown, stat: value, operator: less_or_equal, value: 0 } }
