schemaVersion: 2
rulesVersion: 2
status: approved_parallel_reference

transition:
  mode: overlay
  appliesToRulesVersion: 2
  legacyFilesRemainCanonicalForRulesVersion1: true
  inheritUnchangedRulesV1Entries: true
  activationRequirement: >-
    The Rules v2 exporter and active Rules v2 character data must explicitly consume this file.
    Its presence alone does not change Rules v1 play.

coreRules:
  turnAndEconomy:
    energy:
      sharedByTeam: true
      turnStartMode: set
      turnStartValue: 5
      carriesUnspentEnergy: false
      cap: null
    hand:
      sharedByTeam: true
      drawTarget: 5
      maximumSize: null
      turnStartRule: Draw until the team has at least 5 cards.
      retainReducesTurnStartDraw: true
    ownership:
      cardsHaveOwners: true
      sharedHandDoesNotChangeOwnership: true
      normalPlayPermission: owner_only
      createdCardDefaultOwner: source_character
      scenarioCardDefaultOwner: scenario
    ultimateMeter:
      sharedByTeam: true
      generationSource: energy_actually_paid_as_card_play_cost
      mandatoryCostIncreasesCount: true
      costReductionsLowerGeneration: true
      effectTimeEnergySpendingCounts: false
      additionalCostsCount: false
      createdWithoutPlayCounts: false
      ultimateMeterPaidCounts: false
    movementAction:
      name: Reposition
      timing: before_combat
      freeUsesPerTeamTurn: 1
      additionalUseCost:
        resource: energy
        amount: 1
      options:
        - swap_adjacent_allies
        - move_ally_into_adjacent_empty_position
      grantsUltimateMeter: false

  positions:
    columnsPerTeam: 3
    defeatedPositionsRemainEmpty: true
    compressEmptyPositions: false
    emptyPositionsBreakAdjacency: true
    opposedDefinition: same_column_across_team_lines
    distanceDefinition: absolute_column_difference
    adjacencyDefinition: occupied_immediate_left_or_right_on_same_team_line
    pushPull:
      emptyDestination: move
      occupiedDestination: swap_through
      edgeBehavior: stop
      rootedBehavior: fail_movement
      paidCostsRefundedOnFailure: false

  targeting:
    selectAndLockOnPlay: true
    playRestrictionsRecheckedOnUse: false
    characterLock:
      followsCharacterMovement: true
      distanceAndAdjacencyUseCurrentPosition: true
    positionLock:
      remainsAtSelectedPosition: true
      mayMissOrAffectNewOccupant: true
    illegalCharacterTargetBeforeUse:
      targetFacingEffects: fail
      cardStillUsed: true
      unrelatedEffectsResolve: true
    becomesKeepsLockedTarget: true
    explicitRetargetRequired: true
    targetChanges:
      maximumPerCardUse: 1
      defenderChoosesAmongEligibleChanges: true
      tauntConsumesChange: false
      ordinaryCoverAndRedirectAffectAoE: false

  defense:
    attackVsDefense:
      defenseResolvesFirst: true
      defenseTargetIsProtectedCharacter: true
      protectedCharacterBecomesAttackTargetIfLegal: true
      recalculateDistanceToProtectedCharacter: true
      illegalProtectedTargetBehavior: defense_resolves_attack_keeps_original_target
    defenseVsDefenseOrder: right_card_first
    anyVsSpecialOrder: right_card_first
    scheduledSecondCardMayFailBeforeUse: true

  timing:
    ladder:
      - on_play
      - before_clash
      - clash
      - after_clash
      - before_use
      - on_use
      - on_hit
      - after_use
    alwaysIsContinuous: true
    becomesReevaluation: between_timing_steps
    becomesReevaluatesMidEffectBlock: false
    lockedOnPlay:
      - paid_costs
      - ultimate_meter_generated
      - x
      - user
      - target
      - chosen_zone
    currentDefinitionForUnresolvedCard:
      - name
      - classifications
      - power
      - effects
    defeatCheck:
      afterAtomicEffect: true
      currentCardUseFinishes: true
      queuedUnusedCardsRemoved: true
      victoryAfterCurrentResolvingUseOrEffect: true

  clashAndRolls:
    zoneResolutionDirection: right_to_left
    attackVsAttack:
      compare: clash_total
      loser: cancelled
      tie: both_cancelled
    clashRollSeparateFromUseRoll: true
    powerRoll:
      distribution: uniform_integer_inclusive
      minimumClamp: 0
    multihit:
      clashTotal: sum_independent_rolls_per_remaining_hit
      onAttackClashLoss:
        reduceCount: 1
        reuse: true
        dealDamage: false
      onTie:
        cancelNormally: true
        reduceCount: false
        reuse: false
      atZero: ordinary_single_hit_attack
      useRoll: one_fresh_roll_per_hit
      defaultAreaRollSharing: shared_across_targets_for_same_hit
      fixedPrintedDivisorChangesWithCount: false

  area:
    aoe:
      registryId: area-aoe
      redirectableByOrdinaryCoverOrRedirect: false
      targetBatch: simultaneous
      defaultRollMode: per_hit_shared_targets
    splash:
      registryId: area-splash
      includesFinalPrimaryTarget: true
      includesAllOccupiedAdjacentPositions: true
      emptyPositionIsNotTarget: true
      emptyBreaksAdjacency: true
      recenterAfterTargetChange: true
      snapshotTiming: after_target_changes_before_roll
      targetBatch: simultaneous
    bounce:
      registryId: area-bounce
      countMeaning: secondary_applications
      anchor: final_primary_position
      selection: uniform_random
      replacement: true
      sameTargetMayRepeat: true
      recalculateEligibility: each_application
      noEligibleBehavior: fail_that_application
      primaryDefeatRemovesAnchor: false
      recenterAfterTargetChange: true
      chainFromLastTarget: false
    triggerOrder:
      - primary_target
      - other_targets_left_to_right
      - active_players_line_then_opponents_line_when_both_affected
      - controller_orders_own_optional_triggers
      - mandatory_before_optional

  cardFlow:
    createIsPlay: false
    revealIsDraw: false
    revealIsDiscard: false
    revealIsPlay: false
    revealIsUse: false
    revealIsRemoval: false
    revealedCardRemainsInOriginUntilRelocated: true
    ownerDefeatAppliesBeforeSelectionOfRevealedCard: true
    createdCardCannotSelfCreateInSameUnresolvedChain: true
    defaultCreatedCardDestination: discard
    createdCardTemporaryPatterns:
      exhaust: one_use
      ethereal: disappears_if_unused_at_turn_end
      retain: remains_in_hand
    ownerDefeat:
      removeOwnedCardsFromActiveZones: true
      immediateReplacementDraw: false
      nextTurnDrawsTowardFive: true

  lifecycle:
    exhaust:
      destination: destination-exhaust
      timing: after_resolution
      immediateRemovalOnPlayRequiresExplicitRule: true
    ethereal:
      condition: unused_in_hand_at_turn_end
      destination: destination-exhaust
    ultimate:
      defaultAfterResolution: destination-ultimate-area
      defaultRepeatable: true
    defeatReserve:
      destination: destination-defeat-reserve
      public: true
      receivesStartingCards: true
      receivesCreatedCardsByDefault: false
      receivesExhaustedCards: false
      currentResolvingCardMovesAfterResolution: true

  statuses:
    unifiedSystem: true
    modes:
      binary: no_numeric_magnitude
      stack: one_integer_for_layers_charges_or_duration
      value: resource_progress_ammunition_or_countdown
      potency_count: strength_per_trigger_plus_persistence
    initialPotencyCountApplication:
      potency: applied_amount
      count: 1
    defaultPotencyCountReapplication:
      increasePotency: true
      increaseCount: false
    uniqueStatusGenericRemoval: immune
    externalStatusesSurviveSourceDefeat: true
    removeZeroAfterExpiryConsequences: true
    resolutionOrder:
      - resolve_current_effect
      - reductions_and_consumption
      - gains_and_inflictions
      - zero_and_expiry_effects
      - remove_zero_statuses
      - reevaluate_continuous_rules_and_becomes
      - defeat_and_card_removal
    thresholdCrossing: below_to_at_or_above
    visibilityDefault: public

  damageAndMath:
    broadDamageTypes:
      - damage-physical
      - damage-energy
      - damage-magical
      - damage-mental
      - damage-spiritual
    propertiesHaveNoDefaultRules: true
    sourceSystemTagsHaveNoDefaultRules: true
    attackTagsHaveNoDefaultDefenseBypass: true
    directHpLossIsDamage: false
    rawPowerGrantsHaxResistance: false
    damageImmunityPreventsHit: false
    rounding: floor
    hiddenFractionsCarriedBetweenStages: false
    defaultMinimums:
      power: 0
      damage: 0
      shield: 0
      barrier: 0
      healing: 0
      cost: 0
      hitCount: 0
    damagePipeline:
      - roll_and_modify_power
      - matching_damage_immunity
      - percentage_damage_modifiers
      - shield
      - barrier
      - hp_stage_resist_weakness_absorb
      - hp
    hitInstances:
      definition: one_hit_against_one_target
      onHitScope: per_hit_per_target
      onDamageRequiresPositiveDamage: true
      onHpDamageRequiresHpReduction: true

  defeatAndRecovery:
    defeat:
      triggerHp: 0
      replacementTiming: would_be_defeated
      finishCurrentResolvingUnit: true
      removeOtherUnresolvedCards: true
      characterBecomesUntargetable: true
      clearShield: true
      clearBarrier: true
      clearOrdinaryStatuses: true
      clearUniqueStatusesUnlessPersistent: true
      preserveIndependentEffectsOnOthers: true
    healing:
      canTargetDefeatedCharacters: false
      overhealingDefault: lost
      maxHpIncreaseHeals: false
      maxHpDecreaseClampsCurrentHp: true
      defaultMaxHpFloor: 1
      order:
        - base_amount
        - healing_modifiers
        - wither_percentage
        - wound_flat
        - clamp_zero
        - restore_up_to_max
        - calculate_excess
        - healing_triggers
        - thresholds
    resurrection:
      returnedHpRequired: true
      requiresEmptyAlliedPosition: true
      startingCardsDestination: destination-discard
      ultimatesDestination: destination-ultimate-area
      restoreCreatedCards: false
      restoreExhaustedCards: false
      restoreStatuses: false
      restoreResourcesFormsAmmoEquipment: false
      repeatStartOfMatch: false
      preserveOncePerGameAndIrreversibleRecords: true
      resurrectionHpCountsAsHealing: false
    sacrifice:
      isDamage: false
      isHpLoss: false
      ignoresDamageDefenses: true
      triggersDefeatedAndSacrificedEvents: true
      costMustSuccessfullyOccur: true
    payHp:
      defaultLethal: false
      mustHaveFullAmount: true

  randomness:
    defaultSelection: uniform
    repeatedSelectionReplacement: true
    eligibilityTiming: each_selection
    noEligibleBehavior: fail_random_portion
    publicLogRequiredForDigitalPlay: true
    replayableRandomStateRequired: true
    arbitraryRandomnessMayNerfReliableCanonicalPower: false

  crossover:
    equalization:
      perceive: true
      target: true
      clash: true
      affect: true
      resourceSystemsEquivalent: false
    magnitudeSeparateFromClassification: true
    explicitImmunityRequired: true
    sourceSupportedResistanceRequired: true
    powerSystemNegationMustBeScoped: true

keywordOverrides:
  - id: keyword-exhaust
    name: Exhaust
    category: Card Lifecycle
    tier: Advanced
    replaces: docs/data/keywords.yml#keyword-exhaust
    summary: Move this card to the Exhausted Area after its resolution instead of its ordinary destination.
    rules:
      timing: after_resolution
      destination: destination-exhaust
      immediateOnPlayRequiresExplicitText: true
  - id: keyword-ethereal
    name: Ethereal
    category: Card Lifecycle
    tier: Advanced
    replaces: docs/data/keywords.yml#keyword-ethereal
    summary: If this card remains unused in hand at Turn End, move it to the Exhausted Area.
    rules:
      timing: turn_end
      condition: unused_in_hand
      destination: destination-exhaust
  - id: keyword-innate
    name: Innate
    category: Card Lifecycle
    tier: Advanced
    replaces: docs/data/keywords.yml#keyword-innate
    summary: Put every Innate regular card into the opening hand, then draw until the hand contains at least 5 cards.
    rules:
      maximumPerCharacterNormally: 1
      allInnatesStartEvenWhenMoreThanFive: true
      additionalDrawAfterFiveInnates: false
  - id: keyword-retain
    name: Retain
    category: Card Lifecycle
    tier: Advanced
    replaces: docs/data/keywords.yml#keyword-retain
    summary: Keep this card in hand at Turn End; retained cards count toward the next draw-to-five.
    rules:
      destinationAtTurnEnd: destination-hand
  - id: keyword-evade
    name: Evade
    category: Combat
    tier: Core
    replaces: docs/data/keywords.yml#keyword-evade
    summary: If this Defense's protection reduces the paired Attack's Power damage to 0, prevent that Hit and Reuse the Defense.
    rules:
      timing: after_clash
      requiresPairedDefense: true
      preventsHit: true
      reuseDefense: true
  - id: keyword-counter
    name: Counter
    category: Combat
    tier: Core
    replaces: docs/data/keywords.yml#keyword-counter
    summary: After a successful qualifying Defense, open the single ordinary response window to play a legal card against the attacker.
    rules:
      timing: after_clash
      sharesOrdinaryResponseWindowWith:
        - keyword-follow-up
        - keyword-assist-attack
      maximumOrdinaryResponseWindows: 1
  - id: keyword-follow-up
    name: Follow-Up
    category: Combat
    tier: Core
    replaces: docs/data/keywords.yml#keyword-follow-up
    summary: Immediately play a legal owned card after another card from the same character is Used.
    rules:
      timing: after_use
      entersZoneStack: false
      clashesWithNextCard: false
      costsAndTargetsNormal: true
      cancelledOrNegatedCardOpensWindow: false
      maximumOrdinaryResponseWindows: 1
  - id: keyword-assist-attack
    name: Assist Attack
    category: Combat
    tier: Core
    replaces: docs/data/keywords.yml#keyword-assist-attack
    summary: Immediately play a legal owned card after a card from a different allied character is Used.
    rules:
      timing: after_use
      entersZoneStack: false
      clashesWithNextCard: false
      costsAndTargetsNormal: true
      maximumOrdinaryResponseWindows: 1
  - id: keyword-push
    name: Push X
    category: Positioning
    tier: Core
    replaces: docs/data/keywords.yml#keyword-push
    summary: Move the target away from the source, entering empty positions and swapping through occupied positions.
    rules:
      direction: away_from_source
      emptyDestination: move
      occupiedDestination: swap_through
      edgeBehavior: stop
      rootBehavior: fail
  - id: keyword-pull
    name: Pull X
    category: Positioning
    tier: Core
    replaces: docs/data/keywords.yml#keyword-pull
    summary: Move the target toward the source's column, entering empty positions and swapping through occupied positions.
    rules:
      direction: toward_source_column
      emptyDestination: move
      occupiedDestination: swap_through
      edgeBehavior: stop
      rootBehavior: fail
  - id: keyword-redirect
    name: Redirect (Target)
    category: Targeting
    tier: Advanced
    replaces: docs/data/keywords.yml#keyword-redirect
    summary: Change a legal single-target card or effect to the specified target, consuming the one post-play target change for that use.
    rules:
      affectsAoE: false
      recentersSplashAndBounce: true
      maximumPostPlayTargetChanges: 1
      multipleEligibleChoice: defending_player
  - id: keyword-bounce
    name: Bounce X
    category: Targeting
    tier: Advanced
    replaces: docs/data/keywords.yml#keyword-bounce
    summary: After the primary application, make X random secondary applications to eligible adjacent occupants around the locked primary position.
    rules:
      selection: uniform
      replacement: true
      sameTargetMayRepeat: true
      recalculateEligibility: each_application
      noEligibleBehavior: fail_application
      chainFromLastTarget: false

statusOverrides:
  - id: status-stun
    name: Stun
    type: negative
    mode: binary
    replaces: docs/data/status-effects.yml#status-stun
    summary: During the affected team's next turn, only the Stunned character loses its owned-card and movement actions.
    rules:
      activates: next_affected_team_turn
      blockOwnedCardPlay: true
      blockMovementAndReposition: true
      blockAlliedCharacters: false
      alreadyPlayedCardsResolve: true
      mandatoryInnatesAndStatusesContinue: true
      expires: turn_end
  - id: status-cover
    name: Cover
    type: positive
    mode: value
    replaces: docs/data/status-effects.yml#status-cover
    summary: Before Use, intercept one eligible single-target Attack aimed at a protected ally and spend 1 Value.
    variants:
      adjacent:
        protects: adjacent_allies
      all:
        protects: all_allies
    rules:
      timing: before_use
      affectsSingleTargetAttack: true
      affectsAoE: false
      mayInterceptSplashOrBouncePrimary: true
      recentersSplashAndBounce: true
      consumesPostPlayTargetChange: true
      spendValue: 1
      multipleEligibleChoice: defending_player
      expires: turn_end
  - id: status-taunt
    name: Taunt
    type: positive
    mode: stack
    replaces: docs/data/status-effects.yml#status-taunt
    summary: Restrict initial legal target selection to this character for the status's declared scope when able.
    variants:
      attack: attack_only
      special: special_only
      all: attack_and_special
    legacyDefaultVariant: all
    rules:
      timing: play_target_selection
      affectsAoE: false
      affectsSplashOrBounceExpansion: false
      affectsRandomTargeting: false
      consumesPostPlayTargetChange: false
      multipleEligibleChoice: acting_player
      turnEndReduction: 1
  - id: status-root
    name: Root
    type: negative
    mode: stack
    replaces: docs/data/status-effects.yml#status-root
    summary: Prevent this character from moving, swapping, or participating in Reposition.
    rules:
      blocksReposition: true
      blocksPush: true
      blocksPull: true
      blocksSwap: true
      failedMovementRefundsCosts: false
      turnEndReduction: 1

termOverrides:
  - id: term-ultimate-meter
    name: Ultimate Meter
    replaces: docs/data/terms.yml#term-ultimate-meter
    definition: Shared team resource. Gain Meter only from Energy actually paid as a card's play cost after modifiers.
  - id: term-hand
    name: Hand
    replaces: docs/data/terms.yml#term-hand
    definition: The team's shared hand. Access is shared, but ownership and ordinary play permission remain attached to each card.
  - id: term-movement-round
    name: Reposition
    aliases:
      - Movement Round
    replaces: docs/data/terms.yml#term-movement-round
    definition: Before Combat, each team may take one free Reposition and may pay 1 Energy for each additional Reposition.
  - id: term-becomes
    name: Becomes
    replaces: docs/data/terms.yml#term-becomes
    definition: Automatic state-dependent replacement in deck, hand, and play, reevaluated between timing steps while preserving locked play choices.
  - id: term-created-card
    name: Created Card
    replaces: docs/data/terms.yml#term-created-card
    definition: A card generated during play. Created describes provenance, not Action Type, and ownership defaults to the source character.
  - id: term-defeated
    name: Defeated
    replaces: docs/data/terms.yml#term-defeated
    definition: After the current resolving unit finishes, a 0-HP character leaves play and its recoverable starting cards move to Defeat Reserve.
  - id: term-resurrection
    name: Resurrection
    replaces: docs/data/terms.yml#term-resurrection
    definition: Return a defeated character to an empty allied position with specified HP and the Rules v2 default restoration procedure unless overridden.
  - id: term-damage-types
    name: Damage Types, Properties, Source-System Tags, and Attack Tags
    replaces: docs/data/terms.yml#term-damage-types
    definition: Damage Types classify broad harm; Properties classify phenomena; Source-System Tags identify fictional frameworks; Attack Tags classify delivery. Only explicit rules create interactions.
  - id: term-power-roll
    name: Power Roll
    replaces: docs/data/terms.yml#term-power-roll
    definition: A uniform inclusive integer roll. Clash Rolls and Use Rolls are separate; each Multihit Hit makes a fresh Use Roll by default.
  - id: term-adjacent
    name: Adjacent
    replaces: docs/data/terms.yml#term-adjacent
    definition: The occupied immediate left or right position on the same team line. Empty positions break adjacency.
  - id: term-bounce
    name: Bounce
    replaces: docs/data/terms.yml#term-bounce
    definition: X random secondary applications around the locked primary position, with replacement by default.
  - id: term-splash
    name: Splash
    replaces: docs/data/terms.yml#term-splash
    definition: The final primary target plus every occupied adjacent position on that target's team line, resolved as one simultaneous target batch per Hit.
