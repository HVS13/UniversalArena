    - { id: capability-durable, name: Durable, category: defensive, description: Remains effective under sustained enemy pressure, rules: [], deprecated: false }
    - { id: capability-evade, name: Evade, category: defensive, description: Prevents Hits through Defense and Reuse patterns, rules: [], deprecated: false }
    - { id: capability-counter, name: Counter, category: defensive, description: Converts successful protection into immediate retaliation, rules: [], deprecated: false }
    - { id: capability-cover, name: Cover, category: defensive, description: Intercepts single-target Attacks aimed at allies, rules: [], deprecated: false }
    - { id: capability-recovery, name: Recovery, category: defensive, description: Restores HP, resources, cards, equipment, or lost participation, rules: [], deprecated: false }
    - { id: capability-resurrection, name: Resurrection, category: defensive, description: Returns defeated characters to play, rules: [], deprecated: false }
    - { id: capability-disabler, name: Disabler, category: control, description: Applies Stun or comparable action-prevention effects, rules: [], deprecated: false }
    - { id: capability-movement, name: Movement, category: control, description: Uses Reposition, Push, Pull, swaps, or movement restrictions, rules: [], deprecated: false }
    - { id: capability-targeting, name: Targeting, category: control, description: Changes, restricts, protects, or exploits target selection, rules: [], deprecated: false }
    - { id: capability-denial, name: Denial, category: control, description: Prevents cards, effects, resources, or planned sequences from being used, rules: [], deprecated: false }
    - { id: capability-debuffer, name: Debuffer, category: control, description: Applies harmful modifiers or statuses as a central plan, rules: [], deprecated: false }
    - { id: capability-status, name: Status, category: control, description: Builds, sustains, consumes, converts, or exploits status effects, rules: [], deprecated: false }
    - { id: capability-healer, name: Healer, category: team_economy, description: Restores allied HP as a meaningful recurring contribution, rules: [], deprecated: false }
    - { id: capability-buffer, name: Buffer, category: team_economy, description: Applies beneficial modifiers or statuses to allies, rules: [], deprecated: false }
    - { id: capability-card-access, name: Card Access, category: team_economy, description: Improves Draw, Search, Seek, Scry, Retain, or Created-card access, rules: [], deprecated: false }
    - { id: capability-energy, name: Energy, category: team_economy, description: Generates, preserves, redistributes, or reduces demand on shared Energy, rules: [], deprecated: false }
    - { id: capability-meter, name: Meter, category: team_economy, description: Generates, preserves, spends, or manipulates shared Ultimate Meter, rules: [], deprecated: false }
    - { id: capability-resource, name: Resource, category: team_economy, description: Uses a meaningful personal or team resource engine, rules: [], deprecated: false }
    - { id: capability-ramp, name: Ramp, category: structural, description: Becomes stronger through accumulated state, resources, or progression, rules: [], deprecated: false }
    - { id: capability-transformation, name: Transformation, category: structural, description: Uses forms or state-dependent card replacements as a central engine, rules: [], deprecated: false }
    - { id: capability-equipment, name: Equipment, category: structural, description: Uses equipment state, ammunition, switching, or prepared items, rules: [], deprecated: false }
    - { id: capability-summon, name: Summon, category: structural, description: Uses companions, clones, minions, or constructs, rules: [], deprecated: false }
    - { id: capability-created-cards, name: Created Cards, category: structural, description: Relies on generated cards beyond the starting five, rules: [], deprecated: false }
    - { id: capability-alternate-defeat, name: Alternate Defeat, category: structural, description: Uses a defeat route other than ordinary HP reduction, rules: [], deprecated: false }
    - { id: capability-information, name: Information, category: structural, description: Records or exploits knowledge, identity, revealed objects, or hidden-state access, rules: [], deprecated: false }

  lineupArchetypes:
    - { id: lineup-tempo, name: Tempo, category: lineup_archetype, description: Wins before slower engines mature through early action advantage and pressure, rules: [], deprecated: false }
    - { id: lineup-midrange, name: Midrange, category: lineup_archetype, description: Uses broadly playable actions and flexible routes between pressure, protection, and disruption, rules: [], deprecated: false }
    - { id: lineup-attrition, name: Attrition, category: lineup_archetype, description: Wins through durability, recovery, persistent effects, and repeated favorable exchanges, rules: [], deprecated: false }
    - { id: lineup-control, name: Control, category: lineup_archetype, description: Restricts enemy choices until the opposing plan cannot execute reliably, rules: [], deprecated: false }
    - { id: lineup-setup-execution, name: Setup–Execution, category: lineup_archetype, description: Builds a visible condition and converts it into a decisive payoff, rules: [], deprecated: false }
    - { id: lineup-status-engine, name: Status Engine, category: lineup_archetype, description: Coordinates building, sustaining, consuming, converting, or exploiting statuses, rules: [], deprecated: false }
    - { id: lineup-formation, name: Formation, category: lineup_archetype, description: Uses position, Distance, adjacency, area anchors, Cover, Push, Pull, and Reposition, rules: [], deprecated: false }
    - { id: lineup-ramp, name: Ramp, category: lineup_archetype, description: Invests early actions into transformations, summons, equipment, or progressive resources, rules: [], deprecated: false }
    - { id: lineup-chain, name: Chain, category: lineup_archetype, description: Builds sequences through Follow-Up, Assist, Counter, Reuse, or immediate plays, rules: [], deprecated: false }

  speeds:
    - { id: speed-fast, name: Fast, category: speed, description: Resolves in a Fast response window and may interrupt a slower zone without cancelling it, rules: [], deprecated: false }
    - { id: speed-normal, name: Normal, category: speed, description: Uses the normal response and commitment window, rules: [], deprecated: false }
    - { id: speed-slow, name: Slow, category: speed, description: Represents preparation, commitment, or delayed execution, rules: [], deprecated: false }

  lifecycleDestinations:
    - { id: destination-draw, name: Draw Pile, category: card_zone, description: Return or move the card to the Draw Pile, rules: [], deprecated: false }
    - { id: destination-hand, name: Hand, category: card_zone, description: Move the card to the shared team hand, rules: [], deprecated: false }
    - { id: destination-discard, name: Discard Pile, category: card_zone, description: Move the card to the shared Discard Pile, rules: [], deprecated: false }
    - { id: destination-exhaust, name: Exhausted Area, category: card_zone, description: Remove the card from ordinary circulation for the rest of the match unless explicit text recovers it, rules: [], deprecated: false }
    - { id: destination-ultimate-area, name: Ultimate Area, category: card_zone, description: Return an Ultimate to its pathway area and normal availability lifecycle, rules: [], deprecated: false }
    - { id: destination-defeat-reserve, name: Defeat Reserve, category: card_zone, description: Public holding area for recoverable starting cards belonging to defeated characters, rules: [], deprecated: false }
    - { id: destination-removed, name: Removed, category: card_zone, description: Remove an object with no default recovery route, rules: [], deprecated: false }
    - { id: destination-created-reserve, name: Created Reserve, category: card_zone, description: Holding area for Created-card definitions or prepared generated objects, rules: [], deprecated: false }

  timings:
    - { id: on_play, name: On Play, category: timing, description: After cost payment, legal target selection, and placement, rules: [], deprecated: false }
    - { id: before_clash, name: Before Clash, category: timing, description: Immediately before paired cards make clash decisions or rolls, rules: [], deprecated: false }
    - { id: clash, name: Clash, category: timing, description: The Attack-versus-Attack comparison or other defined clash procedure, rules: [], deprecated: false }
    - { id: after_clash, name: After Clash, category: timing, description: After the clash result is known and before surviving cards proceed to Use, rules: [], deprecated: false }
    - { id: before_use, name: Before Use, category: timing, description: Immediately before a surviving scheduled card begins applying its effects, rules: [], deprecated: false }
    - { id: on_use, name: On Use, category: timing, description: While the card's ordinary effects apply, rules: [], deprecated: false }
    - { id: on_hit, name: On Hit, category: timing, description: Once per Hit instance unless a narrower scope is declared, rules: [], deprecated: false }
    - { id: on_damage, name: On Damage, category: timing, description: When one positive damage instance affects Shield, Barrier, or HP, rules: [], deprecated: false }
    - { id: on_hp_damage, name: On HP Damage, category: timing, description: When one damage instance reduces HP, rules: [], deprecated: false }
    - { id: after_use, name: After Use, category: timing, description: After the complete card use, including all targets and hits, rules: [], deprecated: false }
    - { id: turn_start, name: Turn Start, category: timing, description: At the start of a team turn before ordinary action play, rules: [], deprecated: false }
    - { id: turn_end, name: Turn End, category: timing, description: At the end of a team turn after action resolution, rules: [], deprecated: false }
    - { id: on_gain, name: On Gain, category: timing, description: Immediately when a status or resource is gained, rules: [], deprecated: false }
    - { id: on_expire, name: On Expire, category: timing, description: When a status reaches its expiry condition before removal, rules: [], deprecated: false }
    - { id: on_heal, name: On Heal, category: timing, description: When a healing effect resolves, including when actual HP restored may be zero if the rule says so, rules: [], deprecated: false }
    - { id: on_hp_restored, name: On HP Restored, category: timing, description: Only when current HP actually increases, rules: [], deprecated: false }
    - { id: would_be_defeated, name: Would Be Defeated, category: timing, description: Replacement window before a character becomes defeated, rules: [], deprecated: false }
    - { id: when_defeated, name: When Defeated, category: timing, description: After defeat occurs and its immediate state changes are applied, rules: [], deprecated: false }
    - { id: when_sacrificed, name: When Sacrificed, category: timing, description: When a voluntary Sacrifice successfully defeats its subject, rules: [], deprecated: false }
    - { id: when_resurrected, name: When Resurrected, category: timing, description: After a defeated character returns to play through Resurrection, rules: [], deprecated: false }

  scopes:
    - { id: once_per_play, name: Once per Play, category: effect_scope, description: Resolves once for the act of playing the card, rules: [], deprecated: false }
    - { id: once_per_use, name: Once per Use, category: effect_scope, description: Resolves once across the complete card use regardless of targets or hits, rules: [], deprecated: false }
    - { id: once_per_turn, name: Once per Turn, category: effect_scope, description: Resolves at most once during the defined team or character turn, rules: [], deprecated: false }
    - { id: once_per_game, name: Once per Game, category: effect_scope, description: Resolves at most once during the match and remains spent through defeat or Resurrection, rules: [], deprecated: false }
    - { id: per_target, name: Per Target, category: effect_scope, description: Resolves once for each affected target, rules: [], deprecated: false }
    - { id: per_hit, name: Per Hit, category: effect_scope, description: Resolves once for each hit independent of target count, rules: [], deprecated: false }
    - { id: per_hit_per_target, name: Per Hit per Target, category: effect_scope, description: Resolves once for each Hit instance against each target, rules: [], deprecated: false }
    - { id: once_per_target_per_use, name: Once per Target per Use, category: effect_scope, description: Resolves once for each target across the complete use even if hit repeatedly, rules: [], deprecated: false }
    - { id: per_amount_spent, name: Per Amount Spent, category: effect_scope, description: Resolves or scales once for each unit successfully spent, rules: [], deprecated: false }
    - { id: continuous, name: Continuous, category: effect_scope, description: Remains active while its condition is true and is reevaluated at defined rule boundaries, rules: [], deprecated: false }
