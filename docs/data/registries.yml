schemaVersion: 2
rulesVersion: 2

registries:
  actionTypes:
    - id: action-basic
      name: Basic
      category: action
      description: One of a character's two foundational starting regular-card slots.
      rules: []
      deprecated: false
    - id: action-technique
      name: Technique
      category: action
      description: One of a character's three non-Basic starting regular-card slots.
      rules: []
      deprecated: false
    - id: action-ultimate
      name: Ultimate
      category: action
      description: A card accessed through an Ultimate pathway and normally paid with Ultimate Meter.
      rules: []
      deprecated: false
    - id: action-attack
      name: Attack
      category: action
      description: A card that participates in Attack clashes and normally creates Hit and damage instances when Used.
      rules: []
      deprecated: false
    - id: action-defense
      name: Defense
      category: action
      description: A card that resolves first against a paired Attack and normally grants protection such as Power Shield.
      rules: []
      deprecated: false
    - id: action-special
      name: Special
      category: action
      description: A non-Attack, non-Defense action. It normally has no Power Roll unless explicit text supplies one.
      rules: []
      deprecated: false

  damageTypes:
    - id: damage-physical
      name: Physical
      category: damage_type
      description: Bodily force, weapons, impacts, cuts, projectiles, or other primarily physical harm.
      rules: []
      deprecated: false
    - id: damage-energy
      name: Energy
      category: damage_type
      description: Broad projected or concentrated energy damage that is not better classified as Magical, Mental, or Spiritual.
      rules: []
      deprecated: false
    - id: damage-magical
      name: Magical
      category: damage_type
      description: Damage produced through magic, sorcery, curses, or equivalent supernatural spell systems.
      rules: []
      deprecated: false
    - id: damage-mental
      name: Mental
      category: damage_type
      description: Damage that directly attacks cognition, perception, emotion, or the mind.
      rules: []
      deprecated: false
    - id: damage-spiritual
      name: Spiritual
      category: damage_type
      description: Damage that directly affects souls, spirits, or explicitly spiritual bodies and structures.
      rules: []
      deprecated: false

  properties:
    - id: property-electric
      name: Electric
      category: phenomenon
      description: Electricity or lightning. This has no inherent universal rule and is not a Damage Type.
      rules: []
      deprecated: false
    - id: property-fire
      name: Fire
      category: element
      description: Fire, flame, or heat-associated delivery.
      rules: []
      deprecated: false
    - id: property-ice
      name: Ice
      category: element
      description: Ice, freezing, or extreme-cold-associated delivery.
      rules: []
      deprecated: false
    - id: property-sonic
      name: Sonic
      category: phenomenon
      description: Sound, vibration, or pressure-wave-associated delivery.
      rules: []
      deprecated: false
    - id: property-explosive
      name: Explosive
      category: phenomenon
      description: Explosive, concussive, or blast-associated delivery.
      rules: []
      deprecated: false
    - id: property-radiation
      name: Radiation
      category: phenomenon
      description: Ionizing, radioactive, or source-equivalent radiative exposure.
      rules: []
      deprecated: false
    - id: property-acid
      name: Acid
      category: substance
      description: Acidic or corrosive chemical delivery.
      rules: []
      deprecated: false

  sourceSystemTags:
    - { id: system-ki, name: Ki, category: source_system, description: Dragon Ball ki or explicitly equivalent use within that source, rules: [], deprecated: false }
    - { id: system-chakra, name: Chakra, category: source_system, description: Naruto chakra and chakra-derived techniques, rules: [], deprecated: false }
    - { id: system-reiatsu, name: Reiatsu, category: source_system, description: Bleach spiritual pressure and related spiritual power, rules: [], deprecated: false }
    - { id: system-haki, name: Haki, category: source_system, description: One Piece Haki, rules: [], deprecated: false }
    - { id: system-stand, name: Stand, category: source_system, description: JoJo's Bizarre Adventure Stand power, rules: [], deprecated: false }
    - { id: system-nen, name: Nen, category: source_system, description: Hunter x Hunter Nen, rules: [], deprecated: false }
    - { id: system-cursed-energy, name: Cursed Energy, category: source_system, description: Jujutsu Kaisen cursed energy, rules: [], deprecated: false }
    - { id: system-technology, name: Technology, category: source_system, description: Equipment or abilities whose relevant interaction depends on technology, rules: [], deprecated: false }

  ranges:
    - { id: range-melee, name: Melee, category: range, description: Close-range action whose Distance profile normally favors opposed or nearby targets, rules: [], deprecated: false }
    - { id: range-ranged, name: Ranged, category: range, description: Distance-capable action whose Distance profile normally tolerates or favors separated targets, rules: [], deprecated: false }

  areas:
    - id: area-aoe
      name: AoE
      category: area
      description: Affects every legal character in its explicitly stated area. Ordinary Redirect and Cover do not redirect the area.
      rules: []
      deprecated: false
    - id: area-splash
      name: Splash
      category: area
      description: Affects the final primary target and all occupied adjacent positions on that target's team line.
      rules: []
      deprecated: false
    - id: area-bounce
      name: Bounce
      category: area
      description: Applies X secondary target-facing applications to random eligible occupants adjacent to the locked primary position, with replacement by default.
      rules: []
      deprecated: false
    - { id: area-chain, name: Chain, category: area, description: Reserved area pattern that moves from the most recent target; no default behavior until explicitly defined, rules: [], deprecated: false }
    - { id: area-line, name: Line, category: area, description: Reserved line-shaped area; each card must define its legal positions and snapshot behavior, rules: [], deprecated: false }
    - { id: area-cone, name: Cone, category: area, description: Reserved cone-shaped area; each card must define its legal positions and snapshot behavior, rules: [], deprecated: false }
    - { id: area-ring, name: Ring, category: area, description: Reserved ring-shaped area; each card must define its legal positions and snapshot behavior, rules: [], deprecated: false }
    - { id: area-random-enemies, name: Random Enemies, category: area, description: Reserved random-enemy area; each card must define count, replacement, and eligibility timing, rules: [], deprecated: false }
    - { id: area-source-radius, name: Source Radius, category: area, description: Reserved source-centered area; each card must define radius, line, and snapshot behavior, rules: [], deprecated: false }

  attackTags:
    - { id: attack-slash, name: Slash, category: attack_tag, description: Cutting or slashing delivery. It has no inherent defense bypass, rules: [], deprecated: false }
    - { id: attack-pierce, name: Pierce, category: attack_tag, description: Piercing or thrusting delivery. It has no inherent defense bypass, rules: [], deprecated: false }
    - { id: attack-blunt, name: Blunt, category: attack_tag, description: Impact, crushing, or blunt-force delivery, rules: [], deprecated: false }
    - { id: attack-multihit, name: Multihit, category: attack_tag, description: Uses a mutable remaining Hit Count for clash erosion and repeated Hit resolution, rules: [], deprecated: false }

  effectTags:
    - { id: effect-transformation, name: Transformation, category: effect_tag, description: Changes form, mode, state, or card definitions, rules: [], deprecated: false }
    - { id: effect-recovery, name: Recovery, category: effect_tag, description: Restores HP, resources, cards, equipment, or participation state, rules: [], deprecated: false }
    - { id: effect-buff, name: Buff, category: effect_tag, description: Applies beneficial modifiers or statuses, rules: [], deprecated: false }
    - { id: effect-debuff, name: Debuff, category: effect_tag, description: Applies harmful modifiers or statuses, rules: [], deprecated: false }
    - { id: effect-equipment, name: Equipment, category: effect_tag, description: Creates, equips, switches, reloads, consumes, or destroys equipment, rules: [], deprecated: false }
    - { id: effect-summon, name: Summon, category: effect_tag, description: Creates or controls companions, constructs, clones, minions, or equivalent entities, rules: [], deprecated: false }
    - { id: effect-information, name: Information, category: effect_tag, description: Reveals, records, verifies, or exploits information, rules: [], deprecated: false }
    - { id: effect-alternate-defeat, name: Alternate Defeat, category: effect_tag, description: Advances or completes a defeat route other than ordinary HP reduction, rules: [], deprecated: false }

  roles:
    - { id: role-vanguard, name: Vanguard, category: core_role, description: Applies frontline pressure and remains effective while exposed, rules: [], deprecated: false }
    - { id: role-guardian, name: Guardian, category: core_role, description: Protects allies through Cover, mitigation, interception, control, or recovery, rules: [], deprecated: false }
    - { id: role-striker, name: Striker, category: core_role, description: Converts actions and resources into sustained or explosive direct combat pressure, rules: [], deprecated: false }
    - { id: role-eliminator, name: Eliminator, category: core_role, description: Builds or exploits a decisive condition to remove a priority target, rules: [], deprecated: false }
    - { id: role-controller, name: Controller, category: core_role, description: Restricts enemy choices through statuses, timing, position, targeting, costs, or denial, rules: [], deprecated: false }
    - { id: role-support, name: Support, category: core_role, description: Improves allied survival, access, resources, consistency, or execution, rules: [], deprecated: false }
    - { id: role-specialist, name: Specialist, category: core_role, description: Wins through an unusual source-faithful plan not adequately described by the other Core Roles, rules: [], deprecated: false }

  combatArchetypes:
    - { id: archetype-bruiser, name: Bruiser, category: combat_archetype, description: Durable close or midrange fighter that trades effectively over several exchanges, rules: [], deprecated: false }
    - { id: archetype-duelist, name: Duelist, category: combat_archetype, description: Excels in focused one-target exchanges and repeated favorable clashes, rules: [], deprecated: false }
    - { id: archetype-skirmisher, name: Skirmisher, category: combat_archetype, description: Uses Speed, movement, timing, or selective commitment to enter and leave exchanges, rules: [], deprecated: false }
    - { id: archetype-juggernaut, name: Juggernaut, category: combat_archetype, description: Slow or committed but exceptionally difficult to stop once established, rules: [], deprecated: false }
    - { id: archetype-assassin, name: Assassin, category: combat_archetype, description: Converts access, setup, or vulnerability into concentrated elimination pressure, rules: [], deprecated: false }
    - { id: archetype-marksman, name: Marksman, category: combat_archetype, description: Relies on accurate ranged attacks, ammunition, targeting, or repeated projectile pressure, rules: [], deprecated: false }
    - { id: archetype-artillery, name: Artillery, category: combat_archetype, description: Applies long-range, area, or delayed-zone pressure, rules: [], deprecated: false }
    - { id: archetype-summoner, name: Summoner, category: combat_archetype, description: Uses companions, clones, constructs, or created entities as a major action engine, rules: [], deprecated: false }
    - { id: archetype-tactician, name: Tactician, category: combat_archetype, description: Wins through planning, information, equipment, sequencing, or situational answers, rules: [], deprecated: false }
    - { id: archetype-shapeshifter, name: Shapeshifter, category: combat_archetype, description: Changes forms or card definitions to access distinct tactical states, rules: [], deprecated: false }

  capabilities:
    - { id: capability-burst, name: Burst, category: offensive, description: Concentrated damage or decisive output in a short window, rules: [], deprecated: false }
    - { id: capability-sustained, name: Sustained, category: offensive, description: Repeated reliable pressure across turns or exchanges, rules: [], deprecated: false }
    - { id: capability-execute, name: Execute, category: offensive, description: Increased effectiveness against a target meeting a defeat or vulnerability condition, rules: [], deprecated: false }
    - { id: capability-multihit, name: Multihit, category: offensive, description: Repeated Hit instances and mutable Multihit Count, rules: [], deprecated: false }
    - { id: capability-area, name: Area, category: offensive, description: Regularly affects multiple targets or positions, rules: [], deprecated: false }
    - { id: capability-follow-up, name: Follow-Up, category: offensive, description: Creates immediate action chains through Follow-Up, Assist, Counter, or equivalent windows, rules: [], deprecated: false }
