name: Sync Game Data to Draft Web PR

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "docs/data/**"
      - "docs/assets/characters/**"
      - "docs/scripts/export-game-data.mjs"
      - "docs/scripts/validate-web-sync.mjs"
      - "docs/scripts/package.json"
      - ".github/workflows/export-game-data.yml"

permissions:
  contents: read

concurrency:
  group: canonical-web-sync
  cancel-in-progress: true

env:
  GAME_REPO: HVS13/UniversalArena-Web
  GAME_BASE_BRANCH: main
  EXPECTED_SCHEMA_VERSION: "2"
  EXPECTED_ROSTER_COUNT: "9"

jobs:
  export:
    name: Validate and open draft Web sync PR
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout exact canonical commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify exact canonical source
        id: source
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$GITHUB_REF" != "refs/heads/main" ]]; then
            echo "Synchronization is restricted to canonical main." >&2
            exit 1
          fi
          source_commit="$(git rev-parse HEAD)"
          if [[ "$source_commit" != "$GITHUB_SHA" ]]; then
            echo "Checkout mismatch: expected $GITHUB_SHA, received $source_commit." >&2
            exit 1
          fi
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "Canonical checkout is dirty before export." >&2
            exit 1
          fi
          echo "commit=$source_commit" >> "$GITHUB_OUTPUT"
          echo "short_commit=${source_commit:0:12}" >> "$GITHUB_OUTPUT"

      - name: Resolve scoped Web credential mode
        id: auth
        shell: bash
        env:
          UA_SYNC_TOKEN: ${{ secrets.UA_SYNC_TOKEN }}
          UA_SYNC_APP_ID: ${{ secrets.UA_SYNC_APP_ID }}
          UA_SYNC_APP_PRIVATE_KEY: ${{ secrets.UA_SYNC_APP_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [[ -n "$UA_SYNC_APP_ID" || -n "$UA_SYNC_APP_PRIVATE_KEY" ]]; then
            if [[ -z "$UA_SYNC_APP_ID" || -z "$UA_SYNC_APP_PRIVATE_KEY" ]]; then
              echo "GitHub App authentication is partially configured. Set both UA_SYNC_APP_ID and UA_SYNC_APP_PRIVATE_KEY." >&2
              exit 1
            fi
            echo "mode=app" >> "$GITHUB_OUTPUT"
          elif [[ -n "$UA_SYNC_TOKEN" ]]; then
            echo "mode=pat" >> "$GITHUB_OUTPUT"
          else
            echo "Missing Web credential. Configure a fine-grained UA_SYNC_TOKEN or both GitHub App secrets." >&2
            exit 1
          fi

      - name: Mint repository-scoped GitHub App token
        if: steps.auth.outputs.mode == 'app'
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.UA_SYNC_APP_ID }}
          private-key: ${{ secrets.UA_SYNC_APP_PRIVATE_KEY }}
          owner: HVS13
          repositories: UniversalArena-Web

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install exporter dependencies
        working-directory: docs/scripts
        run: npm install --ignore-scripts --no-audit --no-fund

      - name: Validate canonical data
        working-directory: docs/scripts
        run: npm run validate

      - name: Checkout Web main
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GAME_REPO }}
          token: ${{ steps.app-token.outputs.token || secrets.UA_SYNC_TOKEN }}
          ref: ${{ env.GAME_BASE_BRANCH }}
          path: game
          fetch-depth: 1

      - name: Verify clean Web base
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "$(git -C game status --porcelain)" ]]; then
            echo "Web checkout is dirty before export." >&2
            exit 1
          fi
          echo "WEB_BASE_COMMIT=$(git -C game rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Export exact canonical artifact
        shell: bash
        run: |
          set -euo pipefail
          node docs/scripts/export-game-data.mjs \
            --out game/packages/data/src \
            --assets-out game/apps/client/public/assets/characters \
            --source-repository "$GITHUB_REPOSITORY" \
            --source-commit "${{ steps.source.outputs.commit }}"

      - name: Validate manifest and generated-only scope
        shell: bash
        run: |
          set -euo pipefail
          node docs/scripts/validate-web-sync.mjs \
            --web-root game \
            --source-repository "$GITHUB_REPOSITORY" \
            --source-commit "${{ steps.source.outputs.commit }}" \
            --schema-version "$EXPECTED_SCHEMA_VERSION" \
            --roster-count "$EXPECTED_ROSTER_COUNT"
          node game/packages/data/validate-manifest.mjs

      - name: Stage and verify exact generated diff
        id: changes
        shell: bash
        run: |
          set -euo pipefail
          git -C game add -- packages/data/src apps/client/public/assets/characters
          git -C game diff --cached --check
          if [[ -n "$(git -C game diff --name-only)" ]]; then
            echo "Unstaged changes remain after staging generated outputs." >&2
            git -C game status --short >&2
            exit 1
          fi
          if [[ -n "$(git -C game ls-files --others --exclude-standard)" ]]; then
            echo "Untracked files remain outside the staged generated outputs." >&2
            git -C game status --short >&2
            exit 1
          fi
          if git -C game diff --cached --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "Canonical export already matches Web main."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            git -C game diff --cached --name-only
          fi

      - name: Upload exact generated artifact
        if: steps.changes.outputs.has_changes == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: canonical-web-sync-${{ steps.source.outputs.commit }}
          path: |
            game/packages/data/src/*.json
            game/apps/client/public/assets/characters/*
          if-no-files-found: error
          retention-days: 14

      - name: Commit and push dedicated Web sync branch
        if: steps.changes.outputs.has_changes == 'true'
        id: branch
        shell: bash
        run: |
          set -euo pipefail
          cd game
          sync_branch="automation/canonical-sync-${{ steps.source.outputs.commit }}"
          remote_sha="$(git ls-remote --heads origin "refs/heads/$sync_branch" | cut -f1)"
          if [[ -n "$remote_sha" ]]; then
            git fetch origin "$sync_branch:refs/remotes/origin/$sync_branch"
          fi
          git switch -c "$sync_branch"
          git config user.name "ua-sync-bot"
          git config user.email "ua-sync-bot@users.noreply.github.com"
          git commit -m "chore: sync canonical data ${{ steps.source.outputs.short_commit }}"
          if [[ -n "$remote_sha" ]]; then
            git push \
              --force-with-lease="refs/heads/$sync_branch:$remote_sha" \
              origin "HEAD:refs/heads/$sync_branch"
          else
            git push origin "HEAD:refs/heads/$sync_branch"
          fi
          echo "name=$sync_branch" >> "$GITHUB_OUTPUT"

      - name: Open draft Web pull request
        if: steps.changes.outputs.has_changes == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || secrets.UA_SYNC_TOKEN }}
          SYNC_BRANCH: ${{ steps.branch.outputs.name }}
          SOURCE_COMMIT: ${{ steps.source.outputs.commit }}
        run: |
          set -euo pipefail
          existing_pr="$(gh pr list \
            --repo "$GAME_REPO" \
            --state open \
            --head "$SYNC_BRANCH" \
            --json url,isDraft \
            --jq '.[0] // empty')"
          if [[ -n "$existing_pr" ]]; then
            if [[ "$(jq -r '.isDraft' <<< "$existing_pr")" != "true" ]]; then
              echo "Existing sync PR is not a draft; refusing to update it." >&2
              exit 1
            fi
            jq -r '.url' <<< "$existing_pr"
            exit 0
          fi

          cat > "$RUNNER_TEMP/web-sync-pr.md" <<EOF
          ## What changed

          Synchronizes generated Universal Arena data and character assets from canonical commit [$SOURCE_COMMIT](https://github.com/$GITHUB_REPOSITORY/commit/$SOURCE_COMMIT).

          ## Safety checks

          - Canonical validation passed before export.
          - Manifest schema, source repository, exact source commit, content hash, and nine-character roster were verified.
          - Only generated data and character asset paths are allowed.
          - \`git diff --check\` passed.
          - The exact generated artifact is attached to canonical workflow run [$GITHUB_RUN_ID](https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID).
          - Friend Alpha Checks must pass on this Web PR.

          ## Review requirement

          This PR is intentionally a draft. It requires independent review and must never be merged automatically.
          EOF

          gh pr create \
            --repo "$GAME_REPO" \
            --base "$GAME_BASE_BRANCH" \
            --head "$SYNC_BRANCH" \
            --title "Sync canonical data ${{ steps.source.outputs.short_commit }}" \
            --body-file "$RUNNER_TEMP/web-sync-pr.md" \
            --draft
