name: Apply universal printed Speed

on:
  push:
    branches:
      - agent/clarify-core-rules
    paths:
      - .github/workflows/apply-universal-speed.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/clarify-core-rules
          fetch-depth: 0
      - name: Apply universal Speed calculations
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          def replace_once(path, old, new):
              p = Path(path)
              text = p.read_text()
              count = text.count(old)
              if count != 1:
                  raise RuntimeError(f"{path}: expected one occurrence, found {count}: {old!r}")
              p.write_text(text.replace(old, new, 1))

          def replace_optional(path, old, new):
              p = Path(path)
              text = p.read_text()
              if old in text:
                  p.write_text(text.replace(old, new))

          def replace_section(path, start, end, new_text):
              p = Path(path)
              text = p.read_text()
              pattern = re.compile(r"^" + re.escape(start) + r"\n.*?(?=^" + re.escape(end) + r"\n)", re.M | re.S)
              text, count = pattern.subn(new_text, text, count=1)
              if count != 1:
                  raise RuntimeError(f"{path}: could not replace section {start}")
              p.write_text(text)

          def replace_to_end(path, start, new_text):
              p = Path(path)
              text = p.read_text()
              pattern = re.compile(r"^" + re.escape(start) + r"\n.*\Z", re.M | re.S)
              text, count = pattern.subn(new_text, text, count=1)
              if count != 1:
                  raise RuntimeError(f"{path}: could not replace tail {start}")
              p.write_text(text)

          def set_yaml_power(path, card_name, old_power, new_power):
              p = Path(path)
              lines = p.read_text().splitlines()
              found = False
              for i, line in enumerate(lines):
                  if line.strip().startswith("name:"):
                      value = line.split(":", 1)[1].strip().strip('"')
                      if value == card_name:
                          for j in range(i + 1, min(i + 12, len(lines))):
                              if lines[j].strip().startswith("power:"):
                                  current = lines[j].split(":", 1)[1].strip().strip('"')
                                  if current != old_power:
                                      raise RuntimeError(f"{path} {card_name}: expected {old_power}, found {current}")
                                  indent = lines[j][:len(lines[j]) - len(lines[j].lstrip())]
                                  quote = '"' if ("times X" in new_power or "+" in new_power) else ""
                                  lines[j] = f"{indent}power: {quote}{new_power}{quote}"
                                  found = True
                                  break
                          break
              if not found:
                  raise RuntimeError(f"{path}: card not found or power not replaced: {card_name}")
              p.write_text("\n".join(lines) + "\n")

          def set_md_power(path, card_name, old_power, new_power):
              p = Path(path)
              lines = p.read_text().splitlines()
              found = False
              for i, line in enumerate(lines):
                  if line.startswith("###") and line.rstrip().endswith(card_name):
                      for j in range(i + 1, min(i + 18, len(lines))):
                          marker = "<span><strong>Power:</strong> "
                          if marker in lines[j]:
                              current = lines[j].split(marker, 1)[1].split("</span>", 1)[0]
                              if current != old_power:
                                  raise RuntimeError(f"{path} {card_name}: expected {old_power}, found {current}")
                              lines[j] = lines[j].replace(f"{marker}{old_power}</span>", f"{marker}{new_power}</span>")
                              found = True
                              break
                      break
              if not found:
                  raise RuntimeError(f"{path}: heading not found or power not replaced: {card_name}")
              p.write_text("\n".join(lines) + "\n")

          formula = "docs/power-calculation.md"
          replace_once(formula, "Prerequisite or family allocation:\nFinal Base Power:", "Prerequisite or family allocation:\nPre-Speed Base Power:\nFinal Base Power:")
          replace_section(formula, "## Power stages", "## 1. Determine Cost Base Power", '''## Power stages

Use these terms consistently:

- **Cost Base Power**: Power produced directly by the authoring cost.
- **Adjusted Base Power**: Cost Base Power after pure-output, Created, and execution multipliers, rounded down.
- **Pre-Speed Base Power**: Adjusted Base Power after utility/output adjustments and documented allocations.
- **Final Base Power**: Pre-Speed Base Power after the printed-speed multiplier, rounded down.
- **Printed Power**: The final Melee or Ranged range shown on the card.

For a fixed-value card:

```text
Adjusted Base Power = floor(Cost Base Power x pure-output x Created x execution)
Pre-Speed Base Power = Adjusted Base Power - utility reduction + documented allocation
Final Base Power = floor(Pre-Speed Base Power x printed-speed multiplier)
```

Clamp each post-adjustment stage at 0. Apply a Created-card ceiling to Final Base Power before generating the range.

''')
          replace_section(formula, "## 2. Apply percentage multipliers", "## 3. Round Adjusted Base Power", '''## 2. Apply non-speed percentage multipliers

Apply pure-output, Created, and execution multipliers multiplicatively. Do not add percentages together and do not round between these multipliers.

Printed Speed is applied later to the complete Pre-Speed Base Power. This ensures Speed also affects utility-adjusted budgets, prerequisite allocations, transformation budgets, progression budgets, and character-specific exceptions.

### Pure-output multiplier

Multiply by `1.20` only when the card's Power is exclusively one of:

- Power damage;
- Power Shield;
- Power HP or healing when it is the card's only Power-scaled output.

The bonus normally does not apply when the card also provides meaningful additional value, including statuses, resource gain, draw, card creation, extra healing, AoE/Splash/Bounce access, Evade, Counter, Reuse, or strong tempo effects.

Multihit by itself only divides the same total Power and does not automatically remove this bonus. Per-hit riders and repeated On Hit effects are additional value.

A minor or character-defining rider may be budget-neutral only when the Power Budget Record states that decision. Existing roster values are not automatic permission to make a new rider free.

### Created multiplier

Created cards multiply Base Power by `0.90`.

Creation is an access advantage. Exhaust and Ethereal limit lifecycle but do not cancel the Created multiplier.

### Execution modifier

A narrow, costly, or difficult requirement may multiply Base Power by `1.10-1.20`.

Do not grant this merely because a condition exists. It must materially reduce access, timing, target availability, or reliability.

''')
          replace_section(formula, "## 3. Round Adjusted Base Power", "## 4. Budget additional value", '''## 3. Round Adjusted Base Power

After pure-output, Created, and execution multipliers:

```text
Adjusted Base Power = floor(unrounded adjusted value)
```

Do not round between those multipliers.

Example:

```text
1 Energy, Created, Fast, pure Melee damage
10 x 1.20 x 0.90 = 10.8
Adjusted Base Power = 10
Pre-Speed Base Power = 10
Fast: floor(10 x 0.90) = 9 Final Base Power
```

''')
          replace_once(formula, "Final Base Power = Cost Base Power / 1.5", "Pre-Speed Base Power = Cost Base Power / 1.5")
          replace_once(formula, "30 / 1.5 = 20 Final Base Power", "30 / 1.5 = 20 Pre-Speed Base Power\nNormal: floor(20 x 1.00) = 20 Final Base Power")
          replace_section(formula, "### Replacement and progression families", "## 6. Generate Printed Power", '''### Replacement and progression families

A replacement form normally uses its own printed cost and effects.

A documented family may share one **Pre-Speed Base Power** when a transformation card, status, threshold, consumed resource, limited duration, or drawback pays for the forms' different utility and access.

Printed Speed is never shared or overridden. Every Power-bearing form applies its own printed Fast, Normal, or Slow multiplier to that shared Pre-Speed Base Power.

''')
          replace_section(formula, "## Calculation order", "## Worked examples", '''## Calculation order

1. Determine Cost Base Power.
2. For a 0 Energy Created card, record the creator's Final Base Power ceiling.
3. Express variable costs as additive components.
4. Apply pure-output, Created, and execution percentages multiplicatively.
5. Round each fixed value or variable component down once to Adjusted Base Power.
6. Reduce for additional output and utility.
7. Apply documented prerequisite, recurring-cycle, family, or character-specific allocation to obtain Pre-Speed Base Power.
8. Apply the card form's printed Speed to every Power-bearing card: Fast `x0.90`, Normal `x1.00`, Slow `x1.10`.
9. Round down to Final Base Power.
10. Apply the Created ceiling.
11. Generate Melee or Ranged ranges.
12. Verify the result against the Power Budget Record.

''')
          replace_section(formula, "## Worked examples", "## Current roster precedents", '''## Worked examples

### Pure Melee damage

```text
1 Energy = 10
Pure output: 10 x 1.20 = 12 Adjusted Base Power
Pre-Speed Base Power = 12
Normal: floor(12 x 1.00) = 12 Final Base Power
Melee adjustment: floor(12 x 0.20) = 2
Printed Power: 10-14
```

### Defense with Evade

```text
1 Energy = 10
No pure-output bonus because Evade is utility
Pre-Speed Base Power = 10
Normal: floor(10 x 1.00) = 10 Final Base Power
No separate Evade penalty
Printed Power: 8-12
```

### Fast utility Defense

```text
2 Energy = 20
No pure-output bonus
Pre-Speed Base Power = 20
Fast: floor(20 x 0.90) = 18 Final Base Power
Printed Power: 15-21
```

### Slow pure damage

```text
2 Energy = 20
Pure output: 20 x 1.20 = 24 Adjusted Base Power
Pre-Speed Base Power = 24
Slow: floor(24 x 1.10) = 26 Final Base Power
Printed Power: 21-31
```

### Created Fast pure damage

```text
1 Energy = 10
Pure and Created: 10 x 1.20 x 0.90 = 10.8
Adjusted Base Power = 10
Pre-Speed Base Power = 10
Fast: floor(10 x 0.90) = 9 Final Base Power
Printed Power: 8-10
```

### Fast Ultimate

```text
30 Ultimate Meter = 45
Pre-Speed Base Power = 45
Fast: floor(45 x 0.90) = 40 Final Base Power
Ranged Power: 30-50
```

### Ranged damage plus healing

```text
20 Ultimate Meter = 30
Damage plus Power / 2 healing: 30 / 1.5 = 20 Pre-Speed Base Power
Normal: floor(20 x 1.00) = 20 Final Base Power
Ranged Power: 15-25
```

### Recurring consumable Ultimate

```text
10 Ultimate Meter acquisition + 30 Ultimate Meter activation = 40
40 x 1.5 = 60 Pre-Speed Base Power
Normal: floor(60 x 1.00) = 60 Final Base Power
Ranged Power: 45-75
```

''')
          replace_section(formula, "## Current roster precedents", "## Final checklist", '''## Current roster precedents

These explain existing families; they are not blanket permission for unrelated cards.

- **DIO Basic and Technique cards** use a reconstructed expected-cost exception based on approximately 2 expected Blood Focus reduction. New cards require their own state assumptions.
- **DIO Time Stop forms** share their parent forms' Pre-Speed Base Power, then apply their own printed Fast multiplier.
- **ROAD ROLLER DA!** has Pre-Speed Base Power 90: 60 from 40 Ultimate Meter plus a partial 30 allocation from the consumed Time Stop setup. Fast `x0.90` produces Final Base Power 81 and printed Power `65-97`.
- **Luffy Gear families** share Pre-Speed Base Power across replacement forms because Gear Transformation, limited duration, and Deflate pay for utility differences. Normal, Fast, and Slow forms still apply `x1.00`, `x0.90`, and `x1.10`.
- **Ichigo Bankai and Hollow families** share parent Pre-Speed Base Power because transformation access, duration, and Strain pay for enhanced effects. Each form still applies its printed Speed.
- **Naruto Rasengan forms** share Pre-Speed Base Power 30. Slow Rasengan becomes Final Base Power 33 and `27-39`; Normal Clone Assist remains Final Base Power 30 and `24-36`.
- **Saitama State forms** use progression-family Pre-Speed budgets because State thresholds pay for enhanced effects. Their Fast forms still apply `x0.90`.
- **Leon Rocket Launcher** uses the recurring 10 Meter acquisition plus 30 Meter activation cycle, then applies its Normal multiplier.

''')
          replace_to_end(formula, "## Final checklist", '''## Final checklist

- The Power Budget Record is complete.
- The original cost baseline is visible.
- Every non-speed multiplier has a reason.
- Utility and additional output are not double-counted.
- Setup value is not counted twice.
- Every Power-bearing card applies its own printed Speed with no card-type or family exemption.
- `Power: -` cards do not receive Power calculations.
- Variable coefficients use component ranging.
- Melee/Ranged spread matches the printed type.
- Markdown and YAML show the same Power.
''')

          guide = Path("docs/characters/character-creation-guide.md")
          guide_text = guide.read_text()
          guide_pattern = re.compile(r"^Safeguards:\n.*?(?=^### Basic naming\n)", re.M | re.S)
          guide_text, count = guide_pattern.subn('''Safeguards:

- Every Power-bearing card uses its own printed Speed: Fast `x0.90`, Normal `x1.00`, Slow `x1.10`.
- Printed Speed applies after utility and family allocations to the complete Pre-Speed Base Power.
- Ultimate, transformation, progression, Created, Basic, and Technique cards have no Speed exemption.
- A family may share Pre-Speed Base Power, but forms with different printed Speeds must have different Final Base Power.
- Evade normally removes eligibility for the pure Shield/HP bonus but has no second universal deduction.
- Variable Power expressions use component ranging.
- Current roster precedents explain existing families; they are not automatic templates for new cards.
- Keep Markdown and YAML Power values identical.

''', guide_text, count=1)
          if count != 1:
              raise RuntimeError("character guide: safeguards block not found")
          guide.write_text(guide_text)

          Path("docs/power-ledger.md").write_text('''# Current Roster Power Ledger

This page records how every current Power-bearing card or card family reaches its printed value. It is a companion to [Power Calculation Reference](power-calculation.md).

Use this ledger to preserve established character patterns. Do not copy an exception into a new kit without documenting why the same condition applies.

Entries labeled **Exact** follow the canonical formula directly. Entries labeled **Reconstructed** reproduce current values from the kit and roster pattern where the original calculation note was not preserved. Entries labeled **Exception** intentionally override a standard non-speed adjustment and state what pays for it. Printed Speed is never exempt.

Abbreviations:

- **CBP**: Cost Base Power.
- **ABP**: Adjusted Base Power after non-speed multipliers.
- **PSBP**: Pre-Speed Base Power after utility and allocations.
- **FBP**: Final Base Power after printed Speed.
- **M**: Melee range.
- **R**: Ranged range.

