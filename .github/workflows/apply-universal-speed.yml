## Audit rules

- Every Power-bearing card applies its own printed Speed. Ultimate, transformation, progression, Created, Basic, and Technique cards have no exemption.
- A family may share Pre-Speed Base Power, but never Final Base Power across different printed Speeds.
- A changed card must update this ledger when its calculation pattern changes.
- A new character must add each Power-bearing family before merge.
- A range that does not match the printed Melee/Ranged type is an arithmetic defect unless explicitly documented.
- A structured effect broader than readable text is a data defect; remove it until the schema can represent the condition safely.
- Run the calculator, then validate Markdown/YAML synchronization.
