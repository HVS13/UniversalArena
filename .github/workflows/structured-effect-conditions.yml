name: Apply structured effect conditions

on:
  pull_request:
    types: [opened, ready_for_review]

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'agent/structured-effect-conditions'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/structured-effect-conditions
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Apply schema and data changes
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(path, old, new):
              file = Path(path)
              text = file.read_text(encoding="utf-8")
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{path}: expected one match, found {count}")
              file.write_text(text.replace(old, new, 1), encoding="utf-8")

          replace_once(
              "docs/scripts/export-game-data.mjs",
              "const schemaVersion = 1;",
              "const schemaVersion = 2;",
          )

          replace_once(
              "docs/scripts/export-game-data.mjs",
              'const transformConditionFields = ["kind"];\n',
              "",
          )

          replace_once(
              "docs/scripts/export-game-data.mjs",
              'const restrictionWindows = new Set(["assist_attack", "follow_up", "after_use"]);\n',
              '''const restrictionWindows = new Set(["assist_attack", "follow_up", "after_use"]);
          const statusConditionKinds = new Set([
            "self_has_status",
            "self_missing_status",
            "target_has_status",
            "target_missing_status",
          ]);
          const effectConditionKinds = new Set([...statusConditionKinds, "play_window", "compare"]);
          const comparisonOperators = new Set(["eq", "ne", "lt", "lte", "gt", "gte"]);
          ''',
          )

          replace_once(
              "docs/scripts/export-game-data.mjs",
              '''};

          const validateAmount = (amount, label, errors) => {
          ''',
              '''};

          const validateCondition = (condition, label, errors, allowedKinds) => {
            if (!isPlainObject(condition)) {
              errors.push(`${label} must be an object.`);
              return;
            }

            const kind = condition.kind;
            if (!allowedKinds.has(kind)) {
              errors.push(`${label} has invalid kind "${kind}".`);
              return;
            }

            if (statusConditionKinds.has(kind)) {
              if (typeof condition.status !== "string" || !condition.status.trim()) {
                errors.push(`${label} with kind "${kind}" missing status.`);
              }
              return;
            }

            if (kind === "play_window") {
              if (!restrictionWindows.has(condition.window)) {
                errors.push(`${label} has invalid window "${condition.window}".`);
              }
              return;
            }

            if (kind === "compare") {
              if (!("left" in condition)) {
                errors.push(`${label} missing left operand.`);
              } else {
                validateScalar(condition.left, `${label}.left`, errors);
              }
              if (!comparisonOperators.has(condition.operator)) {
                errors.push(`${label} has invalid operator "${condition.operator}".`);
              }
              if (!("right" in condition)) {
                errors.push(`${label} missing right operand.`);
              } else {
                validateScalar(condition.right, `${label}.right`, errors);
              }
            }
          };

          const validateAmount = (amount, label, errors) => {
          ''',
          )

          replace_once(
              "docs/scripts/export-game-data.mjs",
              '''    const context = `${filename}: ${label} effects[${effectIndex}]`;
              switch (effect.type) {
          ''',
              '''    const context = `${filename}: ${label} effects[${effectIndex}]`;
              if (effect.condition !== undefined) {
                validateCondition(effect.condition, `${context}.condition`, errors, effectConditionKinds);
              }
              switch (effect.type) {
          ''',
          )

          replace_once(
              "docs/scripts/export-game-data.mjs",
              '''          if (transform.condition && typeof transform.condition === "object") {
                        transformConditionFields.forEach((field) => {
                          if (!(field in transform.condition)) {
                            errors.push(
                              `${filename}: ${label}[${index}] transforms[${transformIndex}] condition missing "${field}".`
                            );
                          }
                        });
                      }
          ''',
              '''          if (transform.condition !== undefined) {
                        validateCondition(
                          transform.condition,
                          `${filename}: ${label}[${index}] transforms[${transformIndex}].condition`,
                          errors,
                          statusConditionKinds
                        );
                      }
          ''',
          )

          replace_once(
              "docs/scripts/validate-data-sync.mjs",
              '''const formatIssue = (issue) =>
            `${issue.file} :: ${issue.card ?? "(card)"}${issue.slot ? ` (${issue.slot})` : ""} -> ${issue.field}`;
          ''',
              '''const normalizeStatusName = (value) => value.replace(/\\.$/, "").trim();

          const parseConditionalStatusRequirements = (effectLines) => {
            const requirements = [];
            effectLines.forEach((line) => {
              const followUp = /^On Follow-Up:\\s*(Inflict|Gain)\\s+(\\d+)\\s+(.+?)\\.?$/i.exec(line);
              if (followUp) {
                requirements.push({
                  type: followUp[1].toLowerCase() === "inflict" ? "inflict_status" : "gain_status",
                  amount: Number(followUp[2]),
                  status: normalizeStatusName(followUp[3]),
                  condition: { kind: "play_window", window: "follow_up" },
                });
                return;
              }

              const xEquality = /^On Hit:\\s*If X is (\\d+):\\s*(Inflict|Gain)\\s+(\\d+)\\s+(.+?)\\.?$/i.exec(line);
              if (xEquality) {
                requirements.push({
                  type: xEquality[2].toLowerCase() === "inflict" ? "inflict_status" : "gain_status",
                  amount: Number(xEquality[3]),
                  status: normalizeStatusName(xEquality[4]),
                  condition: {
                    kind: "compare",
                    left: { kind: "x" },
                    operator: "eq",
                    right: Number(xEquality[1]),
                  },
                });
              }
            });
            return requirements;
          };

          const conditionMatches = (actual, expected) => {
            if (!actual || actual.kind !== expected.kind) return false;
            if (expected.kind === "play_window") return actual.window === expected.window;
            if (expected.kind === "compare") {
              return actual.left?.kind === "x" &&
                actual.operator === expected.operator &&
                actual.right === expected.right;
            }
            return false;
          };

          const missingConditionalStatusRequirements = (effectLines, effects) => {
            const requirements = parseConditionalStatusRequirements(effectLines);
            if (!requirements.length) return [];
            if (!Array.isArray(effects)) return requirements;
            return requirements.filter((requirement) =>
              !effects.some((effect) =>
                effect?.type === requirement.type &&
                effect?.status === requirement.status &&
                effect?.amount?.kind === "flat" &&
                effect?.amount?.value === requirement.amount &&
                conditionMatches(effect?.condition, requirement.condition)
              )
            );
          };

          const formatIssue = (issue) =>
            `${issue.file} :: ${issue.card ?? "(card)"}${issue.slot ? ` (${issue.slot})` : ""} -> ${issue.field}`;
          ''',
          )

          replace_once(
              "docs/scripts/validate-data-sync.mjs",
              '''  const restrictionWarnings = [];
            const spendWarnings = [];
          ''',
              '''  const restrictionWarnings = [];
            const spendWarnings = [];
            const conditionalMismatches = [];
          ''',
          )

          replace_once(
              "docs/scripts/validate-data-sync.mjs",
              '''        if (hasMandatorySpendWithoutStructured(mdEffect, yamlCard.effects)) {
                    spendWarnings.push({
                      file: mdFile,
                      card: mdCard.name,
                      slot: mdCard.slot,
                      field: "mandatory spend without spend_status",
                    });
                  }
          ''',
              '''        if (hasMandatorySpendWithoutStructured(mdEffect, yamlCard.effects)) {
                    spendWarnings.push({
                      file: mdFile,
                      card: mdCard.name,
                      slot: mdCard.slot,
                      field: "mandatory spend without spend_status",
                    });
                  }
                  missingConditionalStatusRequirements(mdEffect, yamlCard.effects).forEach((requirement) => {
                    conditionalMismatches.push({
                      file: mdFile,
                      card: mdCard.name,
                      slot: mdCard.slot,
                      field: `missing structured ${requirement.condition.kind} ${requirement.type}`,
                    });
                  });
          ''',
          )

          replace_once(
              "docs/scripts/validate-data-sync.mjs",
              '''  if (!mismatches.length && !missingCards.length && !extraCards.length) {
          ''',
              '''  if (!mismatches.length && !missingCards.length && !extraCards.length && !conditionalMismatches.length) {
          ''',
          )

          replace_once(
              "docs/scripts/validate-data-sync.mjs",
              '''    if (extraCards.length) {
                    console.log("Extra cards:");
                    extraCards.forEach((issue) => console.log(`- ${formatIssue(issue)}`));
                  }
                }
          ''',
              '''    if (extraCards.length) {
                    console.log("Extra cards:");
                    extraCards.forEach((issue) => console.log(`- ${formatIssue(issue)}`));
                  }
                  if (conditionalMismatches.length) {
                    console.log("Conditional effects missing structured data:");
                    conditionalMismatches.forEach((issue) => console.log(`- ${formatIssue(issue)}`));
                  }
                }
          ''',
          )

          replace_once(
              "docs/scripts/validate-data-sync.mjs",
              '''  const hasErrors = mismatches.length || missingCards.length || extraCards.length;
          ''',
              '''  const hasErrors = mismatches.length || missingCards.length || extraCards.length || conditionalMismatches.length;
          ''',
          )

          replace_once(
              "docs/data/README.md",
              '''- `schemaVersion` identifies the exported data contract.
          ''',
              '''- `schemaVersion` identifies the exported data contract. Version 2 adds typed `play_window` and scalar `compare` conditions for card effects.
          ''',
          )

          replace_once(
              "docs/data/README.md",
              '''Scalar expression kinds: `x`, `x_plus`, `x_minus`, `x_times`. Use a number for fixed values.
          Keyword-only effects like Retain can be represented as `type: retain`.

          ## Card restrictions (YAML)
          ''',
              '''Scalar expression kinds: `x`, `x_plus`, `x_minus`, `x_times`. Use a number for fixed values.
          Keyword-only effects like Retain can be represented as `type: retain`.

          ### Effect conditions

          An effect condition is evaluated in addition to the effect's `timing`. Status checks remain supported:

          ```yml
          condition:
            kind: target_has_status
            status: Stun
          ```

          Use `play_window` when an effect applies only because the card was played in a specific window:

          ```yml
          condition:
            kind: play_window
            window: follow_up
          ```

          Supported windows are `assist_attack`, `follow_up`, and `after_use`.

          Use `compare` for scalar comparisons. Operands use the same scalar expression format as amounts and may be numbers or `x`, `x_plus`, `x_minus`, or `x_times` objects:

          ```yml
          condition:
            kind: compare
            left:
              kind: x
            operator: eq
            right: 3
          ```

          Supported operators are `eq`, `ne`, `lt`, `lte`, `gt`, and `gte`.

          Each effect currently accepts one condition. Put timing such as `on_hit` in `timing`; do not duplicate it inside the condition.

          ## Card restrictions (YAML)
          ''',
          )

          replace_once(
              "docs/data/README.md",
              '''Condition kinds: `self_has_status`, `self_missing_status`, `target_has_status`,
          `target_missing_status`.
          ''',
              '''Transform condition kinds: `self_has_status`, `self_missing_status`, `target_has_status`,
          `target_missing_status`. Effect-only `play_window` and `compare` conditions are not valid for transforms.
          ''',
          )

          replace_once(
              "docs/data/characters/leon-s-kennedy-re4.yml",
              '''      - timing: on_use
                type: deal_damage
                amount:
                  kind: power
            - slot: "5"
          ''',
              '''      - timing: on_use
                type: deal_damage
                amount:
                  kind: power
              - timing: on_use
                type: inflict_status
                status: Stun
                amount:
                  kind: flat
                  value: 1
                condition:
                  kind: play_window
                  window: follow_up
            - slot: "5"
          ''',
          )

          replace_once(
              "docs/data/characters/naruto-uzumaki-pre-timeskip.yml",
              '''        hits:
                  kind: x_plus
                  value: 2
            - slot: "5-1"
          ''',
              '''        hits:
                  kind: x_plus
                  value: 2
              - timing: on_hit
                type: inflict_status
                status: Stun
                amount:
                  kind: flat
                  value: 1
                condition:
                  kind: compare
                  left:
                    kind: x
                  operator: eq
                  right: 3
            - slot: "5-1"
          ''',
          )
          PY

      - name: Validate changes
        shell: bash
        run: |
          cd docs/scripts
          npm install
          npm audit
          npm run validate
          npm run export
          cd ../..
          git diff --check

      - name: Commit changes
        shell: bash
        run: |
          rm .github/workflows/structured-effect-conditions.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            docs/data/README.md \
            docs/data/characters/leon-s-kennedy-re4.yml \
            docs/data/characters/naruto-uzumaki-pre-timeskip.yml \
            docs/scripts/export-game-data.mjs \
            docs/scripts/validate-data-sync.mjs \
            .github/workflows/structured-effect-conditions.yml
          git commit -m "Add structured effect conditions"
          git push origin HEAD:agent/structured-effect-conditions
