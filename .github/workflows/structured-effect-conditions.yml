name: Apply structured effect conditions

on:
  pull_request:
    types: [ready_for_review]

permissions:
  contents: write

jobs:
  finish:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'agent/structured-effect-conditions'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/structured-effect-conditions
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Add remaining data and documentation
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(path, old, new):
              file = Path(path)
              text = file.read_text(encoding="utf-8")
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{path}: expected one anchor, found {count}")
              file.write_text(text.replace(old, new, 1), encoding="utf-8")

          replace_once(
              "docs/data/characters/naruto-uzumaki-pre-timeskip.yml",
              """        hits:
          kind: x_plus
          value: 2
  - slot: \"5-1\"
""",
              """        hits:
          kind: x_plus
          value: 2
      - timing: on_hit
        type: inflict_status
        status: Stun
        amount:
          kind: flat
          value: 1
        condition:
          kind: compare
          left:
            kind: x
          operator: eq
          right: 3
  - slot: \"5-1\"
""",
          )

          replace_once(
              "docs/data/README.md",
              """Scalar expression kinds: `x`, `x_plus`, `x_minus`, `x_times`. Use a number for fixed values.
Keyword-only effects like Retain can be represented as `type: retain`.

## Card restrictions (YAML)
""",
              """Scalar expression kinds: `x`, `x_plus`, `x_minus`, `x_times`. Use a number for fixed values.
Keyword-only effects like Retain can be represented as `type: retain`.

### Effect conditions

An effect condition is evaluated in addition to the effect's `timing`. Existing status checks remain supported:

```yml
condition:
  kind: target_has_status
  status: Stun
```

Use `play_window` when an effect applies only because the card was played in a specific window:

```yml
condition:
  kind: play_window
  window: follow_up
```

Supported windows are `assist_attack`, `follow_up`, and `after_use`.

Use `compare` for scalar comparisons. Operands use the same scalar expression format as amounts and may be numbers or `x`, `x_plus`, `x_minus`, or `x_times` objects:

```yml
condition:
  kind: compare
  left:
    kind: x
  operator: eq
  right: 3
```

Supported operators are `eq`, `ne`, `lt`, `lte`, `gt`, and `gte`.

Each effect currently accepts one condition. Keep resolution timing such as `on_hit` in `timing`; do not duplicate timing inside the condition.

`npm run validate` checks condition shapes and verifies supported conditional status wording has matching structured data.

## Card restrictions (YAML)
""",
          )

          replace_once(
              "docs/data/README.md",
              """Condition kinds: `self_has_status`, `self_missing_status`, `target_has_status`,
`target_missing_status`.
""",
              """Transform condition kinds: `self_has_status`, `self_missing_status`, `target_has_status`,
`target_missing_status`. Effect-only `play_window` and `compare` conditions are not valid for transforms.
""",
          )
          PY

      - name: Validate branch
        shell: bash
        run: |
          cd docs/scripts
          npm install
          npm audit
          npm run validate
          npm run export
          cd ../..
          python -m pip install --disable-pip-version-check -q mkdocs-material
          python -m mkdocs build --strict
          git diff --check

      - name: Commit final changes
        shell: bash
        run: |
          rm .github/workflows/structured-effect-conditions.yml
          rm .github/workflows/finish-structured-effect-conditions.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            docs/data/README.md \
            docs/data/characters/naruto-uzumaki-pre-timeskip.yml \
            .github/workflows/structured-effect-conditions.yml \
            .github/workflows/finish-structured-effect-conditions.yml
          git commit -m "Document and apply structured effect conditions"
          git push origin HEAD:agent/structured-effect-conditions
