name: Build canonical data v2 sync artifact

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Check out canonical runner branch
        uses: actions/checkout@v4
        with:
          ref: agent/sync-web-data-v2-runner
          fetch-depth: 0

      - name: Verify operational-only branch scope
        shell: bash
        run: |
          set -euo pipefail
          test "$(git merge-base HEAD def16b684d509001f2c165be08bdac1c91d75e30)" = "def16b684d509001f2c165be08bdac1c91d75e30"
          test "$(git diff --name-only def16b684d509001f2c165be08bdac1c91d75e30...HEAD)" = ".github/workflows/sync-web-data-v2-runner.yml"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install exporter dependencies
        working-directory: docs/scripts
        shell: bash
        run: |
          set -euo pipefail
          npm install
          npm audit

      - name: Export canonical data artifact
        shell: bash
        run: |
          set -euo pipefail
          node docs/scripts/export-game-data.mjs \
            --source-repository HVS13/UniversalArena \
            --source-commit def16b684d509001f2c165be08bdac1c91d75e30 \
            --out sync-output/packages/data/src \
            --assets-out sync-output/apps/client/public/assets/characters

      - name: Verify artifact contract
        shell: bash
        run: |
          set -euo pipefail
          node - <<'NODE'
          const fs = require("node:fs");
          const manifest = JSON.parse(fs.readFileSync("sync-output/packages/data/src/manifest.json", "utf8"));
          const expected = {
            schemaVersion: 2,
            sourceRepository: "HVS13/UniversalArena",
            sourceCommit: "def16b684d509001f2c165be08bdac1c91d75e30",
            contentHash: "sha256:2a9df703f469a7b4096350bca90c158b20ff4c835c21a8b1ecc797736ea7a4c1",
            rosterCount: 9,
          };
          for (const [key, value] of Object.entries(expected)) {
            if (manifest[key] !== value) {
              throw new Error(`Expected ${key}=${value}, received ${manifest[key]}`);
            }
          }
          const expectedFiles = [
            "card-types.json",
            "characters.json",
            "keywords.json",
            "manifest.json",
            "roles.json",
            "status-effects.json",
            "terms.json",
          ];
          const actualFiles = fs.readdirSync("sync-output/packages/data/src").sort();
          if (JSON.stringify(actualFiles) !== JSON.stringify(expectedFiles)) {
            throw new Error(`Unexpected export files: ${actualFiles.join(", ")}`);
          }
          console.log("PASS: canonical schema-v2 artifact verified");
          NODE

          test "$(find sync-output/apps/client/public/assets/characters -type f | wc -l)" -eq 9

      - name: Upload canonical data artifact
        uses: actions/upload-artifact@v4
        with:
          name: canonical-data-v2-def16
          path: sync-output
          if-no-files-found: error
          retention-days: 1

      - name: Record artifact summary
        shell: bash
        run: |
          {
            echo "## Canonical data v2 artifact"
            echo
            echo "- Source commit: \`def16b684d509001f2c165be08bdac1c91d75e30\`"
            echo "- Schema version: \`2\`"
            echo "- Content hash: \`sha256:2a9df703f469a7b4096350bca90c158b20ff4c835c21a8b1ecc797736ea7a4c1\`"
            echo "- Roster count: \`9\`"
            echo "- Generated JSON files: \`7\`"
            echo "- Character assets: \`9\`"
          } >> "$GITHUB_STEP_SUMMARY"
